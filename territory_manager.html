<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영토 관리 시스템</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* ── 헤더 ── */
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .page-header h1 {
            color: white;
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .page-header .osm-link {
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 4px 10px;
            border-radius: 12px;
            white-space: nowrap;
            cursor: pointer;
            position: relative;
            z-index: 10;
            pointer-events: all;
        }
        .page-header .osm-link:hover { background: rgba(255,255,255,0.15); }

        /* ── 메인 레이아웃: 좌(폼) + 우(지도) ── */
        .main-layout {
            display: grid;
            grid-template-columns: 420px 1fr;
            height: calc(100vh - 42px);
        }
        .form-panel {
            overflow: hidden;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        .form-panel-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .map-panel {
            position: relative;
            background: #e8edf2;
        }

        /* ── 카드 ── */
        .card {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 10px 12px;
        }
        .card-title {
            font-size: 11px;
            font-weight: 700;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ── 폼 요소 ── */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        label {
            font-size: 11px;
            font-weight: 600;
            color: #666;
        }
        input, textarea, select {
            padding: 7px 10px;
            border: 1.5px solid #dde2e8;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
            transition: border-color 0.2s;
            background: white;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.12);
        }
        textarea {
            font-family: monospace;
            font-size: 11px;
            min-height: 80px;
            resize: vertical;
        }

        /* ── OSM 입력 행 ── */
        .osm-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .osm-row input {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
        }

        /* ── 버튼 ── */
        .btn {
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .btn:hover { filter: brightness(0.92); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-gray    { background: #6c757d; color: white; }
        .btn-red     { background: #dc3545; color: white; }
        .btn-teal    { background: #17a2b8; color: white; }
        .btn-purple  { background: #6f42c1; color: white; }
        .btn-green   { background: #28a745; color: white; }
        .btn-lg      { padding: 10px 16px; font-size: 13px; flex: 1; }

        .btn-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .action-row {
            display: flex;
            gap: 6px;
        }

        /* ── 입력방식 탭 ── */
        .input-tabs {
            display: flex;
            gap: 0;
            border: 1.5px solid #dde2e8;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .input-tab {
            flex: 1;
            padding: 6px;
            font-size: 11px;
            font-weight: 600;
            border: none;
            background: white;
            color: #888;
            cursor: pointer;
            transition: all 0.15s;
            border-right: 1px solid #dde2e8;
        }
        .input-tab:last-child { border-right: none; }
        .input-tab.active {
            background: #667eea;
            color: white;
        }
        .input-tab:hover:not(.active) { background: #f0f2f5; }

        /* ── 진행 바 ── */
        .progress-bar {
            height: 4px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            display: none;
            margin-top: 6px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        /* ── 로그 ── */
        .log-area {
            background: #1a1a2e;
            color: #cdd9e5;
            padding: 10px 12px;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            max-height: 160px;
            overflow-y: auto;
        }
        .log-entry { margin-bottom: 3px; line-height: 1.45; }
        .log-success { color: #4ec9b0; }
        .log-error   { color: #f48771; }
        .log-info    { color: #7db9e8; }
        .log-warning { color: #dcdcaa; }

        /* ── 재빌드 상태 바 ── */
        #rebuild-status-bar {
            display: none;
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
        }
        #rebuild-status-bar.done  { background: #d4edda; color: #155724; border-color: #28a745; }
        #rebuild-status-bar.error { background: #f8d7da; color: #721c24; border-color: #dc3545; }

        /* ── 지도 ── */
        #map-preview {
            width: 100%;
            height: 100%;
        }
        .map-badge {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            background: rgba(255,255,255,0.9);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            pointer-events: none;
            white-space: nowrap;
        }

        /* ── 토큰 상태 표시 ── */
        .token-status {
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 5px;
            background: #e9ecef;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .token-status.ok  { background: #d4edda; color: #155724; }
        .token-status.bad { background: #fff3cd; color: #856404; }

        /* ── 교차 검색 결과 ── */
        #intersect_results {
            display: none;
            background: white;
            border-top: 2px solid #6f42c1;
            flex-shrink: 0;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; grid-template-rows: auto 300px; height: auto; }
            .map-panel { height: 300px; }
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
</head>
<body>

    <!-- 헤더 -->
    <div class="page-header">
        <h1 style="flex:1;">🗺️ 영토 관리</h1>
        <div style="display:flex; gap:8px; align-items:center; flex-shrink:0; position:relative; z-index:210;">
            <a class="osm-link" href="/territory_overview.html" target="_blank" rel="noopener" style="background:#0f3460; color:#4fc3f7; border:1px solid #1a4080;">📊 전체 현황</a>
            <a class="osm-link" href="https://www.openstreetmap.org/relation/" target="_blank" rel="noopener">OSM 검색 →</a>
        </div>
    </div>

    <!-- 메인: 좌폼 + 우지도 -->
    <div class="main-layout">

        <!-- ── 왼쪽 폼 패널 ── -->
        <div class="form-panel" id="formPanel">
          <div class="form-panel-scroll">

            <!-- 인증 상태 -->
            <div id="token-status-bar" class="token-status bad">⚠️ 로그인 필요 (index.html에서 로그인 후 사용)</div>

            <!-- 지리 데이터 입력 -->
            <div class="card">
                <div class="card-title">🌍 지리 데이터</div>

                <!-- 입력 방식 탭 -->
                <div class="input-tabs">
                    <button class="input-tab active" onclick="switchTab('osm',this)">OSM Relation ID</button>
                    <button class="input-tab" onclick="switchTab('geojson',this)">GeoJSON 직접 입력</button>
                    <button class="input-tab" onclick="switchTab('url',this)">URL</button>
                </div>

                <!-- OSM 입력 (기본) -->
                <div id="osm_input">
                    <div class="osm-row">
                        <input type="text" id="osm_id" placeholder="예: 304716 (India)" style="font-size:15px; font-weight:700;">
                        <button class="btn btn-primary" onclick="fetchFromOSM()">🌍 가져오기</button>
                    </div>
                    <div class="btn-row" style="margin-top:6px;">
                        <button class="btn btn-teal"   onclick="openOSMMap()">지도 열기</button>
                        <button class="btn btn-purple" onclick="intersectPreview()">교차 검색</button>
                        <button class="btn btn-red"    onclick="deleteByOSM()">🗑️ OSM으로 삭제</button>
                    </div>
                </div>

                <!-- GeoJSON 직접 입력 -->
                <div id="geojson_input" style="display:none;">
                    <textarea id="geojson" placeholder='{"type":"Feature","geometry":{"type":"Polygon","coordinates":[...]}}'></textarea>
                </div>

                <!-- URL 입력 -->
                <div id="url_input" style="display:none;">
                    <div style="display:flex; gap:6px;">
                        <input type="text" id="geojson_url" placeholder="https://example.com/data.geojson" style="flex:1;">
                        <button class="btn btn-gray" onclick="fetchFromURL()">📥 가져오기</button>
                    </div>
                </div>

                <!-- GeoJSON 로드 요약 (OSM/URL 가져온 후 표시) -->
                <div id="geojson_display" style="display:none; margin-top:8px;">
                    <label style="margin-bottom:3px; display:flex; justify-content:space-between; align-items:center;">
                        <span>GeoJSON (로드됨)</span>
                        <button class="btn btn-gray" style="padding:2px 8px; font-size:10px;" onclick="toggleGeoJsonEditor()">편집</button>
                    </label>
                    <div id="geojson_summary" style="font-size:11px; color:#555; background:#e9ecef; padding:5px 8px; border-radius:4px;"></div>
                </div>
            </div>

            <!-- 기본 정보 -->
            <div class="card">
                <div class="card-title">📝 기본 정보</div>
                <div class="form-row" style="margin-bottom:8px;">
                    <div class="form-group">
                        <label>영문 이름 *</label>
                        <input type="text" id="name" placeholder="India">
                    </div>
                    <div class="form-group">
                        <label>한글 이름</label>
                        <input type="text" id="name_ko" placeholder="인도">
                    </div>
                </div>
                <div class="form-row" style="margin-bottom:8px;">
                    <div class="form-group">
                        <label>코드 (선택)</label>
                        <input type="text" id="code" placeholder="IN">
                    </div>
                    <div class="form-group">
                        <label>타입</label>
                        <select id="type">
                            <option value="country">국가</option>
                            <option value="admin_area">행정구역</option>
                            <option value="historical">역사적 영토</option>
                            <option value="cultural">문화권</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>시작 연도</label>
                        <input type="number" id="start_year" value="-3000">
                    </div>
                    <div class="form-group">
                        <label>종료 연도</label>
                        <input type="number" id="end_year" value="3000">
                    </div>
                </div>
            </div>

            <!-- 실행 버튼 -->
            <div class="action-row">
                <button class="btn btn-primary btn-lg" onclick="processAndSave()">✅ 저장</button>
                <button class="btn btn-gray   btn-lg" onclick="validateOnly()">🔍 검증</button>
                <button class="btn btn-green  btn-lg" onclick="exportJSON()">📤 내보내기</button>
            </div>
            <div class="progress-bar" id="progress"><div class="progress-fill" id="progress-fill"></div></div>

            <!-- 재빌드 상태 -->
            <div id="rebuild-status-bar"></div>

            <!-- 로그 -->
            <div class="log-area" id="log"></div>

            <!-- hidden inputs -->
            <input type="hidden" id="jwt_token">
          </div><!-- /.form-panel-scroll -->

            <!-- 교차 검색 결과 (하단 고정) -->
            <div id="intersect_results">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:#6f42c1; color:white;">
                    <span style="font-weight:700; font-size:13px;">🔎 교차 검색 결과</span>
                    <button onclick="document.getElementById('intersect_results').style.display='none'"
                        style="padding:2px 8px; font-size:11px; background:rgba(255,255,255,0.2); color:white; border:1px solid rgba(255,255,255,0.4); border-radius:4px; cursor:pointer;">✕</button>
                </div>
                <div id="intersect_results_list" style="max-height:200px; overflow-y:auto;"></div>
                <div style="display:flex; flex-wrap:wrap; gap:6px; padding:8px 12px; border-top:1px solid #dee2e6; background:#fff;">
                    <button onclick="selectAllIntersect(true)"  class="btn btn-gray"  style="padding:5px 10px; font-size:12px;">모두 선택</button>
                    <button onclick="selectAllIntersect(false)" class="btn btn-gray"  style="padding:5px 10px; font-size:12px; background:#adb5bd;">선택 해제</button>
                    <button onclick="backupThenDeleteSelectedIntersect()" class="btn btn-green" style="padding:5px 10px; font-size:12px;">💾 백업 후 삭제</button>
                    <button onclick="deleteSelectedFromIntersect()"       class="btn btn-red"   style="padding:5px 10px; font-size:12px;">🗑️ 삭제</button>
                </div>
            </div>

        </div><!-- /.form-panel -->

        <!-- ── 오른쪽 지도 패널 ── -->
        <div class="map-panel">
            <div class="map-badge" id="map-badge">OSM ID를 입력하고 가져오기를 누르면 지도에 표시됩니다</div>
            <div id="map-preview"></div>
        </div>

    </div><!-- /.main-layout -->

    <form id="territoryForm" style="display:none;"></form>

    <script>
        // ── 환경 ──
        const isLocal = window.location.hostname === 'localhost'
                     || window.location.hostname === '127.0.0.1'
                     || window.location.protocol === 'file:';
        const API_BASE = (window.location.protocol === 'file:')
            ? 'http://localhost:3000/api'
            : `${window.location.origin}/api`;

        // 로컬 서버 내부 API URL (브라우저 접속 호스트와 동일한 호스트 사용 → CORS 없음)
        // 예: http://127.0.0.1:3000 접속 시 → http://127.0.0.1:3000/api/internal/...
        //     http://localhost:3000 접속 시  → http://localhost:3000/api/internal/...
        const LOCAL_SERVER_BASE = (() => {
            if (window.location.protocol === 'file:') return 'http://localhost:3000';
            const h = window.location.hostname;
            if (h === 'localhost' || h === '127.0.0.1') return `http://${h}:3000`;
            return null; // 프로덕션(Vercel)에서는 로컬 API 없음
        })();

        // ── 토큰 자동 감지 ──
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const bar = document.getElementById('token-status-bar');
            if (token) {
                document.getElementById('jwt_token').dataset.fullToken = token;
                bar.className = 'token-status ok';
                bar.textContent = '✓ 로그인됨 — ' + (isLocal ? '로컬 서버' : 'Vercel');
            } else {
                bar.className = 'token-status bad';
            }
            log(`📡 API: ${API_BASE}`, 'info');
        });

        // ── 탭 전환 ──
        let _currentTab = 'osm';
        function switchTab(tab, el) {
            _currentTab = tab;
            document.querySelectorAll('.input-tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('osm_input').style.display     = tab === 'osm'     ? 'block' : 'none';
            document.getElementById('geojson_input').style.display = tab === 'geojson' ? 'block' : 'none';
            document.getElementById('url_input').style.display     = tab === 'url'     ? 'block' : 'none';
            // GeoJSON 탭이 아닌 경우 summary 패널 유지 (데이터가 있으면)
            if (tab === 'geojson') {
                document.getElementById('geojson_display').style.display = 'none';
            }
        }

        // OSM/URL로 GeoJSON 로드 완료 후 summary 표시
        // - #geojson textarea는 geojson_input 탭 안에 있는 하나뿐
        // - OSM/URL 탭에서 로드된 경우 summary를 보여주고 textarea는 접어둠
        function showGeoJsonLoaded(label) {
            const txt = document.getElementById('geojson').value;
            let summary = '데이터 로드됨';
            try {
                const g = JSON.parse(txt);
                const geom = g.geometry || g;
                const coordCount = JSON.stringify(geom.coordinates || []).split(',').length;
                summary = `${geom.type} · 좌표 약 ${coordCount}개`;
            } catch(e) {}
            document.getElementById('geojson_summary').textContent = summary;
            document.getElementById('geojson_display').style.display = 'block';
            // textarea는 geojson_input 탭 안에 있으므로, 탭이 geojson이 아니면 숨겨진 상태
            // 편집 버튼을 누르면 geojson 탭으로 전환됨
        }

        function toggleGeoJsonEditor() {
            // GeoJSON 탭으로 전환하여 textarea 직접 편집
            const tab = document.querySelector('.input-tab:nth-child(2)');
            switchTab('geojson', tab);
        }

        // ── 로그 ──
        function log(message, type = 'info') {
            const logArea = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const ts = new Date().toLocaleTimeString('ko-KR');
            entry.textContent = `[${ts}] ${message}`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        // ── 로컬 타일 재빌드 알림 ──
        async function notifyLocalTileRebuild(action, ids = []) {
            if (!LOCAL_SERVER_BASE) {
                log('ℹ️ 프로덕션 환경 — 로컬 타일 재빌드 없음', 'info');
                return;
            }
            try {
                const res = await fetch(`${LOCAL_SERVER_BASE}/api/internal/tile-notify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ids: ids.map(String) })
                });
                if (res.ok) {
                    log('🗺️ 로컬 서버 타일 재빌드 시작', 'success');
                    startRebuildPolling();
                }
            } catch (e) {
                log('ℹ️ 로컬 서버 미실행 (Vercel 저장 완료)', 'info');
            }
        }

        // ── OSM 가져오기 ──
        // Overpass 미러 서버 목록 (504 대비 순차 fallback)
        const OVERPASS_ENDPOINTS = [
            'https://overpass-api.de/api/interpreter',
            'https://overpass.kumi.systems/api/interpreter',
            'https://overpass.openstreetmap.ru/api/interpreter'
        ];

        async function fetchOverpass(query, retries = 2) {
            let lastErr;
            for (const endpoint of OVERPASS_ENDPOINTS) {
                for (let attempt = 0; attempt <= retries; attempt++) {
                    try {
                        const res = await fetch(endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'User-Agent': 'KoreaHistoryMap/1.0' },
                            body: `data=${encodeURIComponent(query)}`
                        });
                        if (res.status === 429 || res.status === 503 || res.status === 504) {
                            lastErr = new Error(`Overpass ${endpoint.split('/')[2]} 오류: ${res.status}`);
                            // 재시도 전 잠깐 대기
                            await new Promise(r => setTimeout(r, 1200 * (attempt + 1)));
                            continue;
                        }
                        if (!res.ok) throw new Error(`Overpass 오류: ${res.status}`);
                        return await res.json();
                    } catch(e) {
                        lastErr = e;
                        if (attempt < retries) await new Promise(r => setTimeout(r, 800));
                    }
                }
            }
            throw lastErr || new Error('Overpass API 모든 서버 실패');
        }

        async function fetchFromOSM() {
            const osmId = document.getElementById('osm_id').value.trim();
            if (!osmId) { log('OSM ID를 입력해주세요', 'error'); return; }
            if (!/^\d+$/.test(osmId)) { log('OSM ID는 숫자만 입력하세요', 'error'); return; }

            log(`🔍 OSM Relation ${osmId} 조회 중...`, 'info');
            setProgress(10);

            try {
                // 1. 이름 정보: Nominatim 우선 → Overpass fallback
                let name = `OSM ${osmId}`, nameKo = '', nameEn = '', adminLevel = 4, type = 'province';
                let nameFromNominatim = false;

                try {
                    const nmRes = await fetch(`https://nominatim.openstreetmap.org/lookup?osm_ids=R${osmId}&format=json`, {
                        headers: { 'User-Agent': 'KoreaHistoryMap/1.0', 'Accept-Language': 'ko' }
                    });
                    if (nmRes.ok) {
                        const nmData = await nmRes.json();
                        if (nmData && nmData.length > 0) {
                            const nm = nmData[0];
                            name   = nm.display_name?.split(',')[0] || nm.name || name;
                            nameKo = nm.localname || nm.name || '';
                            nameEn = nm.name || '';
                            const al = parseInt(nm.extratags?.admin_level || nm.address?.admin_level || '4');
                            adminLevel = isNaN(al) ? 4 : al;
                            nameFromNominatim = true;
                            log('  ✅ Nominatim 이름 정보 로드', 'info');
                        }
                    }
                } catch(e) { log('  ⚠️ Nominatim 이름 조회 실패, Overpass 시도...', 'warning'); }

                if (!nameFromNominatim) {
                    log('  🔄 Overpass로 이름 정보 조회 중...', 'info');
                    const overpassData = await fetchOverpass(`[out:json][timeout:25];relation(${osmId});out body;`);
                    setProgress(40);
                    if (!overpassData.elements || overpassData.elements.length === 0) throw new Error('OSM Relation을 찾을 수 없습니다');
                    const tags = overpassData.elements[0].tags || {};
                    name   = tags.name || tags['name:en'] || tags['name:ko'] || `OSM ${osmId}`;
                    nameKo = tags['name:ko'] || tags.name || '';
                    nameEn = tags['name:en'] || tags.name || '';
                    adminLevel = tags.admin_level ? parseInt(tags.admin_level) : 4;
                }

                setProgress(45);
                if (adminLevel === 2 || adminLevel <= 3) type = 'country';
                else if (adminLevel >= 6) type = 'admin_area';

                document.getElementById('name').value    = nameEn || name;
                document.getElementById('name_ko').value = nameKo || name;
                document.getElementById('code').value    = osmId;
                document.getElementById('type').value    = type;

                // hidden osm_id
                let osmIdField = document.getElementById('osm_id_hidden');
                if (!osmIdField) {
                    osmIdField = document.createElement('input');
                    osmIdField.type = 'hidden'; osmIdField.id = 'osm_id_hidden';
                    document.getElementById('territoryForm').appendChild(osmIdField);
                }
                osmIdField.value = `r${osmId}`;

                // 2. GeoJSON (Nominatim 우선 → Overpass geom fallback)
                setProgress(70);
                let geometryLoaded = false;

                try {
                    const geoUrl = `https://nominatim.openstreetmap.org/lookup?osm_ids=R${osmId}&format=geojson&polygon_geojson=1`;
                    const geoResponse = await fetch(geoUrl, { headers: { 'User-Agent': 'KoreaHistoryMap/1.0' } });
                    if (geoResponse.ok) {
                        const geoData = await geoResponse.json();
                        if (geoData.features && geoData.features.length > 0) {
                            const feature = geoData.features[0];
                            const g = feature.geometry || feature;
                            if (g && g.coordinates && g.coordinates.length > 0) {
                                document.getElementById('geojson').value = JSON.stringify(feature, null, 2);
                                saveBBox(calculateBBox(g));
                                geometryLoaded = true;
                                log('  📐 Nominatim GeoJSON 로드 완료', 'info');
                            }
                        }
                    }
                } catch (e) { log('  ⚠️ Nominatim GeoJSON 실패, Overpass fallback...', 'warning'); }

                if (!geometryLoaded) {
                    log('  🔄 Overpass 폴리곤 요청 중 (미러 서버 자동 전환)...', 'info');
                    try {
                        const d = await fetchOverpass(`[out:json][timeout:60];relation(${osmId});out geom;`);
                        const rel = d.elements && d.elements[0];
                        if (rel && rel.members) {
                            const outerRings = rel.members.filter(m => m.type === 'way' && m.role === 'outer' && m.geometry).map(m => m.geometry.map(p => [p.lon, p.lat]));
                            if (outerRings.length > 0) {
                                const geomType = outerRings.length === 1 ? 'Polygon' : 'MultiPolygon';
                                const coords   = geomType === 'Polygon' ? outerRings : outerRings.map(r2 => [r2]);
                                const feature  = { type: 'Feature', properties: rel.tags || {}, geometry: { type: geomType, coordinates: coords } };
                                document.getElementById('geojson').value = JSON.stringify(feature, null, 2);
                                saveBBox(calculateBBox(feature.geometry));
                                geometryLoaded = true;
                                log(`  📐 Overpass GeoJSON 완료 (${geomType}, ${outerRings.length} rings)`, 'info');
                            }
                        }
                    } catch (e2) { log(`  ❌ Overpass geom 실패: ${e2.message}`, 'error'); }
                }

                if (!geometryLoaded) {
                    log('⚠️ 폴리곤 데이터 없음. GeoJSON 탭에서 수동 입력하세요.', 'warning');
                } else {
                    showGeoJsonLoaded(nameKo || name);
                    try { showOnMap(JSON.parse(document.getElementById('geojson').value), nameKo || name); } catch(e) {}
                }

                setProgress(100);
                log(`✅ ${name} (${nameKo}) 로드 완료 · 행정단계 ${adminLevel} · ${type}`, 'success');
                if (!nameKo || nameKo === nameEn) log('💡 한글 이름을 확인/수정해 주세요', 'warning');

            } catch (error) {
                log(`❌ OSM 로드 실패: ${error.message}`, 'error');
                setProgress(0);
            }
        }

        function saveBBox(bbox) {

        async function fetchFromURL() {
            const url = document.getElementById('geojson_url').value.trim();
            if (!url) { log('URL을 입력해주세요', 'error'); return; }
            log('URL에서 데이터 가져오는 중...', 'info');
            setProgress(30);
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const text = await response.text().catch(() => '');
                    throw new Error(`HTTP ${response.status} — ${text.slice(0,100)}`);
                }
                const contentType = (response.headers.get('content-type') || '').toLowerCase();
                if (!/application\/(geo\+)?json|json/.test(contentType)) {
                    const text = await response.text().catch(() => '');
                    if (text.trim().startsWith('<')) throw new Error('응답이 HTML입니다 (404 또는 리디렉션)');
                    try {
                        const parsed = JSON.parse(text);
                        document.getElementById('geojson').value = JSON.stringify(parsed, null, 2);

                        log('✓ URL 데이터 로드 완료', 'success');
                        setProgress(100); return;
                    } catch(e) { throw new Error('JSON이 아닙니다 (Content-Type=' + contentType + ')'); }
                }
                const data = await response.json();
                document.getElementById('geojson').value = JSON.stringify(data, null, 2);
                showGeoJsonLoaded('URL 로드');
                try { showOnMap(data, 'URL 로드'); } catch(e) {}

                setProgress(100);
            } catch (error) {
                let msg = error.message;
                if (msg.includes('Failed to fetch')) msg = '네트워크/CORS 오류: 콘솔 확인';

        function calculateBBox(geometry) {
            if (!geometry || !geometry.coordinates) return null;
            let minLat = Infinity, maxLat = -Infinity, minLng = Infinity, maxLng = -Infinity;
            const p = (coords) => {
                if (typeof coords[0] === 'number') {
                    const [lng, lat] = coords;
                    if (lat < minLat) minLat = lat; if (lat > maxLat) maxLat = lat;
                    if (lng < minLng) minLng = lng; if (lng > maxLng) maxLng = lng;
                } else { coords.forEach(p); }
            };
            p(geometry.coordinates);
            return { minLat, maxLat, minLng, maxLng };
        }

        function validateOnly() {
            log('=== 검증 시작 ===', 'info');
            const data = collectFormData();
            if (!data) return;
            log(`✓ 이름: ${data.name} (${data.name_ko})`, 'success');
            log(`✓ 타입: ${data.type} · 연도: ${data.start_year}~${data.end_year}`, 'info');
            log(`✓ GeoJSON: ${data.geometry.type} · BBox: [${data.bbox.minLat.toFixed(1)}, ${data.bbox.minLng.toFixed(1)}] → [${data.bbox.maxLat.toFixed(1)}, ${data.bbox.maxLng.toFixed(1)}]`, 'success');
            log('=== 검증 완료 ===', 'success');
        }

        function collectFormData() {
            const name = document.getElementById('name').value.trim();
            const name_ko = document.getElementById('name_ko').value.trim();
            const geojsonText = document.getElementById('geojson').value.trim();
            const osmId = document.getElementById('osm_id_hidden')?.value;
            const isOsmImport = !!osmId;
            if (!name || !geojsonText) { log('이름과 GeoJSON을 입력해주세요', 'error'); return null; }
            let geojsonData;
            try { geojsonData = JSON.parse(geojsonText); }
            catch (e) { log('GeoJSON 파싱 실패', 'error'); return null; }
            const geometry = geojsonData.geometry || geojsonData;
            if (!geometry.coordinates) { log('GeoJSON에 coordinates가 없습니다', 'error'); return null; }
            const bbox = calculateBBox(geometry);
            if (!bbox) { log('BBox 계산 실패', 'error'); return null; }
            const data = {
                name,
                name_en: document.getElementById('name_en')?.value?.trim() || name,
                name_ko: name_ko || name,
                code: document.getElementById('code').value.trim(),
                type: document.getElementById('type').value,
                admin_level: parseInt(document.getElementById('admin_level')?.value) || 4,
                country: document.getElementById('country')?.value?.trim() || name,
                geometry, bbox,
                start_year: parseInt(document.getElementById('start_year').value) || -5000,
                end_year:   parseInt(document.getElementById('end_year').value)   || 3000,
                properties: { source: isOsmImport ? 'OSM Import' : 'TerritoryManager', import_date: new Date().toISOString() }
            };
            if (osmId) data.osm_id = osmId;
            // Ensure name_type is sent (fallback to name)
            data.name_type = (data.properties && data.properties.name_type) || data.name || document.getElementById('name_en')?.value?.trim();
            return data;
        }

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
    // ── 지도 미리보기 ──
    let _previewMap = null;
    let _previewLayer = null;

    (function initMap() {
        _previewMap = L.map('map-preview', { zoomControl: true, scrollWheelZoom: true });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 18
        }).addTo(_previewMap);
        _previewMap.setView([20, 0], 2);
    })();

    function showOnMap(geojsonData, labelText) {
        if (_previewLayer) { _previewMap.removeLayer(_previewLayer); _previewLayer = null; }
        try {
            _previewLayer = L.geoJSON(geojsonData, {
                style: { color: '#667eea', weight: 2, fillColor: '#667eea', fillOpacity: 0.25 }
            }).addTo(_previewMap);
            const bounds = _previewLayer.getBounds();
            if (bounds.isValid()) _previewMap.fitBounds(bounds, { padding: [30, 30] });
            if (labelText) document.getElementById('map-badge').textContent = '📍 ' + labelText;
        } catch (e) { log('⚠️ 지도 렌더링 실패: ' + e.message, 'warning'); }
    }

    // GeoJSON textarea 변경 시 자동 미리보기 (GeoJSON 탭에서 직접 편집할 때)
    document.addEventListener('DOMContentLoaded', () => {
        const textarea = document.getElementById('geojson');
        let _timer = null;
        textarea.addEventListener('input', () => {
            clearTimeout(_timer);
            _timer = setTimeout(() => {
                const txt = textarea.value.trim();
                if (!txt) return;
                try {
                    const data = JSON.parse(txt);
                    const name = document.getElementById('name').value || document.getElementById('name_ko').value || 'GeoJSON';
                    showOnMap(data, name);
                } catch (e) {}
            }, 600);
        });
    });

    // ── 재빌드 상태 폴링 ──
    let _pollTimer = null;
    function startRebuildPolling() {
        if (!LOCAL_SERVER_BASE) return;
        const bar = document.getElementById('rebuild-status-bar');
        bar.className = ''; bar.style.display = 'block';
        bar.textContent = '⏳ 로컬 서버 타일 재빌드 중...';
        let attempts = 0;
        clearInterval(_pollTimer);
        _pollTimer = setInterval(async () => {
            if (++attempts > 60) {
                clearInterval(_pollTimer);
                bar.textContent = '⚠️ 상태 확인 시간 초과'; bar.className = 'error'; return;
            }
            try {
                const res = await fetch(`${LOCAL_SERVER_BASE}/api/internal/tile-status`);
                if (!res.ok) throw new Error();
                const status = await res.json();
                if (status.inProgress) {
                    bar.textContent = `⏳ 재빌드 진행 중... (dirty: ${status.dirtyCount})`;
                } else {
                    clearInterval(_pollTimer);
                    bar.textContent = '✅ 재빌드 완료! Vercel 배포 후 지도에서 확인하세요.';
                    bar.className = 'done';
                    log('✅ 타일 재빌드 완료', 'success');
                    setTimeout(() => { bar.style.display = 'none'; }, 8000);
                }
            } catch (e) {
                clearInterval(_pollTimer);
                bar.textContent = 'ℹ️ 로컬 서버 미실행 (Vercel 저장 완료)';
                setTimeout(() => { bar.style.display = 'none'; }, 4000);
            }
        }, 2000);
    }
    </script>
</body>
