<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <title>페이지를 찾을 수 없습니다 | 고려만리지도</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;background:radial-gradient(circle at 50% 20%,#25313d,#0d1217 58%);color:#ece7dc;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;text-align:center}.box{max-width:560px}.code{color:#d4af37;font:700 clamp(4rem,18vw,8rem)/1 Georgia,serif}h1{margin:18px 0 12px;font-size:clamp(1.5rem,5vw,2.25rem)}p{margin:0 auto 28px;color:#aaa69d;line-height:1.75}a{display:inline-flex;min-height:46px;align-items:center;padding:0 19px;border-radius:8px;background:#b68e24;color:#111;font-weight:700;text-decoration:none}
  </style>
</head>
<body><main class="box"><div class="code">404</div><h1>이 지점에는 기록이 없습니다</h1><p>주소가 바뀌었거나 삭제된 페이지입니다. 역사지도로 돌아가 다른 시대와 장소를 탐색해 보세요.</p><a href="/">역사지도로 돌아가기</a></main></body>
</html>
