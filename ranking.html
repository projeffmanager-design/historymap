<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>사관 랭킹 및 사료 - 고려만리지도</title>
    <link rel="icon" type="image/jpg" href="https://pds.joongang.co.kr/news/component/htmlphoto_mmdata/200609/htm_20060904073327a000a010-001.JPG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Yeon+Sung&display=swap" rel="stylesheet">
    <style>
        /* ── 전역 색상 변수 ── */
        :root {
            --bg-page:      #111820;
            --bg-panel:     rgba(20, 30, 44, 0.97);
            --bg-card:      rgba(255, 255, 255, 0.04);
            --bg-card-alt:  rgba(255, 255, 255, 0.07);
            --gold:         rgba(180, 140, 80, 1);
            --gold-border:  rgba(180, 140, 80, 0.40);
            --gold-soft:    rgba(180, 140, 80, 0.15);
            --text-main:    #d8cfc4;
            --text-title:   #f0e2c0;
            --text-muted:   #8fa0b0;
            --text-link:    #a8c4d8;
            --accent-teal:  rgba(90, 160, 180, 0.85);
            --divider:      rgba(180, 140, 80, 0.22);
        }

        body {
            background-color: var(--bg-page);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(60,40,10,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 90%, rgba(10,30,50,0.25) 0%, transparent 55%);
            color: var(--text-main);
            font-family: 'Noto Serif KR', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* ── 헤더 배너 ── */
        .popup-header {
            position: sticky;
            top: 0;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--gold-border);
            padding: 14px 24px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            box-shadow: 0 2px 16px rgba(0,0,0,0.55);
        }
        .popup-header h1 {
            margin: 0;
            font-size: 1.55em;
            color: var(--text-title);
            text-shadow: 0 1px 6px rgba(0,0,0,0.7);
            font-family: 'Yeon Sung', cursive;
            letter-spacing: 0.06em;
        }

        #main-title {
            font-family: 'Yeon Sung', cursive;
            font-size: 3em;
            color: var(--gold);
            text-shadow: 2px 2px 4px #000;
            cursor: pointer;
            margin-bottom: 20px;
            display: none;
        }

        /* ── 메인 컨테이너 ── */
        #contentContainer {
            width: 98%;
            max-width: 100%;
            background: var(--bg-panel);
            padding: 22px;
            margin-top: 12px;
            margin-bottom: 80px;
            border-radius: 10px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            border: 1px solid var(--gold-border);
        }

        /* ── 내부 헤더 ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--divider);
        }
        .header h1 {
            color: var(--text-title);
            margin: 0;
            font-size: 1.9em;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
        }

        /* ── 탭 메뉴 ── */
        .tab-menu {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--divider);
            margin-bottom: 22px;
        }
        .tab-button {
            padding: 10px 24px;
            border: 1px solid var(--gold-border);
            border-bottom: none;
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 7px 7px 0 0;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.25s;
            font-family: 'Noto Serif KR', serif;
        }
        .tab-button.active {
            background: var(--gold-soft);
            color: var(--text-title);
            border-color: var(--gold-border);
            border-bottom-color: var(--bg-panel);
        }
        .tab-button:hover:not(.active) {
            background: rgba(180,140,80,0.08);
            color: var(--text-main);
        }

        /* ── 탭 컨텐츠 ── */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── 공통 테이블 ── */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 11px 12px;
            text-align: left;
            border-bottom: 1px solid var(--divider);
        }
        th {
            background: rgba(180,140,80,0.12);
            color: var(--text-title);
            font-weight: bold;
            letter-spacing: 0.03em;
        }
        th.sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        th.sortable:hover {
            background: rgba(180,140,80,0.2);
        }
        th.sortable::after { content: ' ⇅'; opacity: 0.4; font-size: 12px; }
        th.sortable.sort-asc::after { content: ' ↑'; opacity: 1; }
        th.sortable.sort-desc::after { content: ' ↓'; opacity: 1; }
        td { color: var(--text-main); }
        tr.current-user {
            background: rgba(180,140,80,0.1);
            border-left: 3px solid var(--gold);
        }
        tr.current-user td {
            color: var(--text-title);
            font-weight: bold;
        }
        tr:hover { background: rgba(180,140,80,0.06); }
        .rank-1 { color: #f0d060; font-weight: bold; }
        .rank-2 { color: #c0c8cc; font-weight: bold; }
        .rank-3 { color: #c8986a; font-weight: bold; }

        /* ── 랭킹 섹션 ── */
        .ranking-section { margin-bottom: 32px; }
        .ranking-section h3 {
            margin: 0 0 14px 0;
            padding: 9px 14px;
            background: var(--gold-soft);
            border-radius: 6px;
            border-left: 4px solid var(--gold);
        }

        /* ── 재상급 사관 테이블 ── */
        .ministers-table-container {
            background: rgba(180,140,80,0.04);
            border: 1px solid var(--gold-border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
        }
        .ministers-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(20,30,44,0.6);
            border-radius: 6px;
            overflow: hidden;
        }
        .ministers-table th {
            background: linear-gradient(135deg, rgba(180,140,80,0.85), rgba(160,110,50,0.85));
            color: #1a1208;
            padding: 11px 14px;
            text-align: left;
            font-weight: bold;
            border-bottom: 1px solid var(--gold-border);
            letter-spacing: 0.03em;
        }
        .ministers-table td {
            padding: 11px 14px;
            border-bottom: 1px solid rgba(180,140,80,0.12);
            color: var(--text-main);
        }
        .ministers-table tr:nth-child(even) { background: rgba(180,140,80,0.04); }
        .ministers-table tr:hover { background: rgba(180,140,80,0.09); }

        /* ── 일반 사관 테이블 ── */
        .regular-officers-container {
            background: var(--bg-card);
            border: 1px solid var(--gold-border);
            border-radius: 10px;
            padding: 14px;
            max-height: 800px;
            overflow-y: auto;
        }
        .regular-officers-container::-webkit-scrollbar { width: 7px; }
        .regular-officers-container::-webkit-scrollbar-track {
            background: rgba(180,140,80,0.06);
            border-radius: 4px;
        }
        .regular-officers-container::-webkit-scrollbar-thumb {
            background: rgba(180,140,80,0.35);
            border-radius: 4px;
        }
        .regular-officers-container::-webkit-scrollbar-thumb:hover {
            background: rgba(180,140,80,0.55);
        }
        .regular-officers-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(20,30,44,0.5);
            border-radius: 6px;
            overflow: hidden;
        }
        .regular-officers-table th {
            background: rgba(30,45,60,0.95);
            color: var(--text-title);
            padding: 11px 8px;
            text-align: left;
            font-weight: bold;
            border-bottom: 1px solid var(--gold-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .regular-officers-table td {
            padding: 9px 8px;
            border-bottom: 1px solid rgba(180,140,80,0.10);
            color: var(--text-main);
            font-size: 14px;
        }
        .regular-officers-table tr:nth-child(even) { background: rgba(255,255,255,0.025); }
        .regular-officers-table tr:hover { background: rgba(180,140,80,0.07); }

        /* ── 사료 필터 ── */
        .filter-section {
            margin-bottom: 20px;
            padding: 14px;
            background: var(--bg-card);
            border: 1px solid var(--gold-border);
            border-radius: 8px;
        }
        .filter-section label {
            color: var(--text-main);
            margin-right: 10px;
            font-weight: 600;
        }
        .filter-section select {
            padding: 8px 14px;
            border: 1px solid var(--gold-border);
            border-radius: 6px;
            background: rgba(20,30,44,0.9);
            color: var(--text-main);
            font-size: 14px;
            cursor: pointer;
        }
        .filter-section input[type="text"],
        .filter-section input {
            border: 1px solid var(--gold-border);
            border-radius: 6px;
            background: rgba(20,30,44,0.9);
            color: var(--text-main);
        }

        /* ── 사료 리스트 ── */
        .contribution-item {
            background: var(--bg-card);
            padding: 14px 16px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--gold-border);
            cursor: pointer;
            transition: all 0.22s;
        }
        .contribution-item:hover {
            background: var(--bg-card-alt);
            border-left-color: var(--gold);
            transform: translateX(4px);
        }
        .contribution-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .contribution-title {
            font-weight: bold;
            color: var(--text-title);
            font-size: 16px;
        }
        .contribution-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-pending  { background: rgba(230,160,40,0.2);  color: #e6a828; border: 1px solid rgba(230,160,40,0.4); }
        .status-reviewed { background: rgba(80,180,160,0.2);  color: #50b4a0; border: 1px solid rgba(80,180,160,0.4); }
        .status-approved { background: rgba(180,140,80,0.2);  color: #b8a060; border: 1px solid rgba(180,140,80,0.4); }
        .status-rejected { background: rgba(200,70,60,0.2);   color: #c8463c; border: 1px solid rgba(200,70,60,0.4); }
        .contribution-details {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ── 버튼 스타일 ── */
        button, .button-style {
            padding: 9px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.25s;
            font-family: 'Noto Serif KR', serif;
        }
        .btn-primary {
            background: rgba(180,140,80,0.75);
            color: #120e04;
            border: 1px solid rgba(180,140,80,0.5);
        }
        .btn-primary:hover {
            background: rgba(200,160,90,0.9);
            box-shadow: 0 3px 12px rgba(180,140,80,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: var(--text-title);
            border: 1px solid var(--gold-border);
        }
        .btn-secondary:hover {
            background: var(--gold-soft);
            color: var(--text-title);
        }
        .btn-danger {
            background: rgba(200,60,50,0.75);
            color: white;
        }
        .btn-danger:hover {
            background: rgba(220,70,60,0.9);
        }

        /* ── 오류신고 버튼 ── */
        #error-report-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        #error-report-btn {
            display: inline-block;
            background: rgba(200,70,60,0.75);
            color: #f0e0d8;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 22px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(200,70,60,0.5);
            box-shadow: 0 3px 12px rgba(0,0,0,0.4);
            transition: all 0.25s;
        }
        #error-report-btn:hover {
            background: rgba(220,80,70,0.9);
            transform: translateY(-2px);
            box-shadow: 0 5px 18px rgba(0,0,0,0.5);
        }

        /* ── 모달 스타일 ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            overflow-y: auto;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: rgba(18,26,38,0.98);
            color: var(--text-main);
            margin: 4% auto;
            padding: 28px;
            border: 1px solid var(--gold-border);
            width: 90%;
            max-width: 800px;
            max-height: 84vh;
            overflow-y: auto;
            border-radius: 10px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.8);
        }
        .modal-content::-webkit-scrollbar { width: 7px; }
        .modal-content::-webkit-scrollbar-track { background: rgba(180,140,80,0.05); border-radius: 4px; }
        .modal-content::-webkit-scrollbar-thumb { background: rgba(180,140,80,0.3); border-radius: 4px; }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--divider);
        }
        .modal-header h2 {
            margin: 0;
            color: var(--text-title);
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: var(--text-muted);
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #c86050; }

        /* ── 반응형 ── */
        @media (max-width: 768px) {
            #contentContainer { width: 95%; padding: 16px; }
            .header { flex-direction: column; gap: 12px; }
            .tab-button { padding: 8px 14px; font-size: 14px; }
            table { font-size: 12px; }
            th, td { padding: 7px; }
        }
    </style>
</head>
<body>
    <!-- 🚩 [추가] 팝업 전용 헤더 -->
    <div class="popup-header">
        <h1>📜 사관 랭킹 및 사료</h1>
    </div>
    
    <div id="contentContainer">
        <div class="header">
            <div class="header-buttons" style="width: 100%; display: flex; justify-content: flex-end;">
                <button type="button" id="rankInfoBtn" class="btn-secondary">직급 안내</button>
            </div>
        </div>
        
        <!-- 탭 메뉴 -->
        <div class="tab-menu">
            <button class="tab-button active" data-tab="ranking">🏆 랭킹</button>
            <button class="tab-button" data-tab="contributions">📚 사료</button>
        </div>
        
        <!-- 랭킹 탭 -->
        <div id="ranking-tab" class="tab-content active">
            <!-- 재상급 사관 테이블 -->
            <div class="ranking-section">
                <h3 style="color: #f0e2c0; margin-bottom: 15px; font-size: 1.4em;">👑 재상급 사관 (정1품 ~ 종2품)</h3>
                <div class="ministers-table-container">
                    <table class="ministers-table">
                        <thead>
                            <tr>
                                <th>순위</th>
                                <th>사관명</th>
                                <th>직급</th>
                                <th style="text-align: right;">승인건수</th>
                                <th style="text-align: right;">승인점수</th>
                                <th style="text-align: right;">사료외</th>
                                <th style="text-align: right;">공적</th>
                            </tr>
                        </thead>
                        <tbody id="ministersTableBody">
                            <!-- 재상급 사관 데이터가 여기에 동적으로 추가됩니다 -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- 일반 사관 테이블 -->
            <div class="ranking-section">
                <h3 style="color: #a8c4d8; margin: 25px 0 15px 0; font-size: 1.4em;">🎯 일반 사관 랭킹 (정3품 ~ 종9품)</h3>
                <div class="regular-officers-container">
                    <table class="regular-officers-table">
                        <thead>
                            <tr>
                                <th class="sortable" data-sort="rank">순위</th>
                                <th class="sortable" data-sort="username">사관명</th>
                                <th class="sortable" data-sort="position">직급</th>
                                <th class="sortable" data-sort="submitted_count" style="text-align: right;">사료제출 (×3)</th>
                                <th class="sortable" data-sort="recommended_count" style="text-align: right;">추천받은수 (×1)</th>
                                <th class="sortable" data-sort="approved_count" style="text-align: right;">승인된건수 (×10)</th>
                                <th class="sortable" data-sort="reviewed_count" style="text-align: right;">검토 (×5)</th>
                                <th class="sortable" data-sort="attendance_count" style="text-align: right;">출석 (×1)</th>
                                <th class="sortable" data-sort="score" style="text-align: right;">공적</th>
                            </tr>
                        </thead>
                        <tbody id="rankingTableBody">
                            <!-- 일반 사관 데이터가 여기에 동적으로 추가됩니다 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 사료 탭 -->
        <div id="contributions-tab" class="tab-content">
            <div class="filter-section" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <div class="search-box" style="flex: 2; min-width: 200px; position: relative;">
                    <span style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #8fa0b0;">🔍</span>
                    <input type="text" id="searchInput" placeholder="사료명, 내용, 제출자 검색..." style="width: 100%; padding: 10px 10px 10px 35px; border: 1px solid rgba(180,140,80,0.35); border-radius: 5px; box-sizing: border-box; background: rgba(14,22,34,0.9); color: #d8cfc4;">
                </div>
                
                <div class="filter-group" style="flex: 1; min-width: 120px;">
                    <select id="statusFilter" style="width: 100%; padding: 10px; border: 1px solid rgba(180,140,80,0.35); border-radius: 5px; background: rgba(14,22,34,0.9); color: #d8cfc4; cursor: pointer;">
                        <option value="all">📊 모든 상태</option>
                        <option value="pending">⏳ 검토 대기</option>
                        <option value="reviewed">✅ 1차 검토완료</option>
                        <option value="approved">⭐ 최종 승인</option>
                        <option value="rejected">❌ 거부됨</option>
                    </select>
                </div>
                
                <div class="filter-group" style="flex: 1; min-width: 120px;">
                    <select id="ownershipFilter" style="width: 100%; padding: 10px; border: 1px solid rgba(180,140,80,0.35); border-radius: 5px; background: rgba(14,22,34,0.9); color: #d8cfc4; cursor: pointer;">
                        <option value="all" selected>👥 전체 사료</option>
                        <option value="mine">👤 내 사료만</option>
                    </select>
                </div>
            </div>
            <div id="contributionsList">
                <!-- 사료 데이터가 여기에 동적으로 추가됩니다 -->
            </div>
        </div>
    </div>

    <!-- 오류신고 버튼 -->
    <div id="error-report-container">
        <a href="mailto:projeffmanager@gmail.com?subject=고려만리지도 오류신고&body=발견하신 오류를 자세히 설명해주세요." id="error-report-btn">
            🐛 오류신고
        </a>
    </div>

    <!-- 사료 상세 모달 -->
    <div id="contributionDetailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📚 사료 상세 정보</h2>
                <button class="close-btn" id="closeDetailBtn">&times;</button>
            </div>
            <div id="contributionDetailContent">
                <!-- 상세 내용이 여기에 동적으로 추가됩니다 -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api'; // 로컬: localhost:3000/api, Vercel: historymap-psi.vercel.app/api

        // ⚡ 클라이언트 캐시 (탭 재방문 시 재요청 방지)
        let _clientRankingsCache = null;
        let _clientRankingsCacheTime = 0;
        let _clientContribsCache = null;
        let _clientContribsCacheTime = 0;
        const CLIENT_CACHE_TTL = 2 * 60 * 1000; // 2분

        // 탭 전환
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', () => {
                const tabName = button.getAttribute('data-tab');
                
                // 모든 탭 버튼과 컨텐츠 비활성화
                document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                
                // 선택된 탭 활성화
                button.classList.add('active');
                document.getElementById(`${tabName}-tab`).classList.add('active');
                
                // ⚡ 캐시 유효 시 재요청 없이 렌더링만
                if (tabName === 'ranking') {
                    if (_clientRankingsCache && Date.now() - _clientRankingsCacheTime < CLIENT_CACHE_TTL) {
                        renderRankingsFromCache(_clientRankingsCache);
                    } else {
                        loadRankings();
                    }
                } else if (tabName === 'contributions') {
                    loadContributions(); // 사료는 필터가 있어 항상 새로 요청
                }
            });
        });

        // 직급명을 구체적으로 표시하는 함수
        function getDetailedPosition(score, rank = null) {
            // 동일한 기준을 server.js / index.html의 calculateRealtimePosition과 맞춥니다.
            // 정1품~종2품(재상급)은 순위와 결합되어 결정되므로 여기서는 점수 기준만 적용된 이름을 반환합니다.
            if (score >= 2600) return '정3품 수찬관(修撰官)';
            if (score >= 2100) return '종3품 직수찬관(直修撰官)';
            if (score >= 1700) return '정4품 사관수찬(史館修撰)';
            if (score >= 1400) return '종4품 시강학사(侍講學士)';
            if (score >= 1100) return '정5품 기거주(起居注)';
            if (score >= 850)  return '종5품 기거사(起居舍)';
            if (score >= 650)  return '정6품 기거랑(起居郞)';
            if (score >= 450)  return '종6품 기거도위(起居都尉)';
            if (score >= 300)  return '정7품 수찬(修撰)';
            if (score >= 200)  return '종7품 직문한(直文翰)';
            if (score >= 120)  return '정8품 주서(注書)';
            if (score >= 60)   return '종8품 검열(檢閱)';
            if (score >= 30)   return '정9품 정자(正字)';
            return '종9품 수분권지(修分權知)';
        }

        // DB에 구 형식(품계 없음)으로 저장된 직급에 품계를 붙여주는 함수
        const POSITION_RANK_MAP = {
            '감수국사': '정1품 감수국사', '판사관사': '종1품 판사관사',
            '수국사': '정2품 수국사',     '동수국사': '종2품 동수국사',
            '수찬관': '정3품 수찬관',     '직수찬관': '종3품 직수찬관',
            '사관수찬': '정4품 사관수찬', '시강학사': '종4품 시강학사',
            '기거주': '정5품 기거주',     '기거사': '종5품 기거사',
            '기거랑': '정6품 기거랑',     '기거도위': '종6품 기거도위',
            '수찬': '정7품 수찬',         '직문한': '종7품 직문한',
            '주서': '정8품 주서',         '검열': '종8품 검열',
            '정자': '정9품 정자',         '수분권지': '종9품 수분권지',
            '백성': '백성'
        };
        function normalizePosition(pos) {
            if (!pos) return '종9품 수분권지';
            if (/^(정|종)[0-9]품/.test(pos)) return pos;
            return POSITION_RANK_MAP[pos] || pos;
        }

        // 재상급 사관인지 확인하는 함수 — 서버가 isMinister 플래그를 정확히 계산해서 내려줌
        // (종2품 이상 점수 + 상위 4명 조건은 서버에서 처리)
        function isMinister(user) {
            if (user.isMinister) return true;
            if (user.isDesignated) return true;
            return false; // 서버 판단에 완전히 위임 — 클라이언트 자체 점수 판별 제거
        }

        // 숨길 계정 목록 (관리용 계정 등 비회원)
        const HIDDEN_USERNAMES = new Set(['송나라 사신 서긍']);

        // ⚡ 랭킹 데이터 렌더링 (fetch 결과 or 캐시 모두 사용)
        function renderRankingsFromCache(users) {
            const ministers = users.filter(user => isMinister(user));
            const regularOfficers = users.filter(user => !isMinister(user));

            // 재상급 사관 테이블
            const ministersTableBody = document.getElementById('ministersTableBody');
            ministersTableBody.innerHTML = '';
            if (ministers.length === 0) {
                const row = document.createElement('tr');
                const cell = document.createElement('td');
                cell.colSpan = 7; cell.textContent = '재상급 사관이 없습니다.';
                cell.style.textAlign = 'center'; cell.style.color = '#95a5a6';
                row.appendChild(cell); ministersTableBody.appendChild(row);
            } else {
                const currentUsername = localStorage.getItem('username');
                // DocumentFragment로 한 번에 삽입 (리플로우 최소화)
                const frag = document.createDocumentFragment();
                ministers.forEach((user, index) => {
                    const row = document.createElement('tr');
                    const isCurrentUser = currentUsername && user.username === currentUsername;
                    const isAdmin = user.role === 'admin' || user.role === 'superuser';
                    const isDesignated = !isAdmin && user.designated_rank != null;
                    const badge = isAdmin
                        ? '<span style="font-size:9px;background:#8e44ad;color:#fff;border-radius:3px;padding:0 3px;margin-left:4px;">관리자</span>'
                        : isDesignated ? '<span style="font-size:9px;background:#c0392b;color:#fff;border-radius:3px;padding:0 3px;margin-left:4px;">지정</span>' : '';
                    const nonSubmitScore = (user.approvedCount || 0) * 10
                        + (user.totalVotes || 0) + (user.reviewScore || 0) + (user.attendancePoints || 0);
                    row.innerHTML = `
                        <td style="font-weight:bold;color:#f1c40f;">${user.rank || (index + 1)}</td>
                        <td style="font-weight:bold;${isCurrentUser ? 'color:#f1c40f;' : ''}">${user.username}${isCurrentUser ? ' 👑' : ''}${badge}</td>
                        <td style="font-weight:bold;color:#e67e22;">${normalizePosition(user.position) || getDetailedPosition(user.score || 0)}</td>
                        <td style="text-align:right;">${user.approvedByCount || 0}</td>
                        <td style="text-align:right;">${user.approvalScore || 0}</td>
                        <td style="text-align:right;">${nonSubmitScore}</td>
                        <td style="text-align:right;font-weight:bold;color:#f1c40f;">${user.score || 0}</td>`;
                    frag.appendChild(row);
                });
                ministersTableBody.appendChild(frag);
            }

            // 일반 사관 테이블
            rankingData = regularOfficers;
            sortRankings(currentSortColumn, currentSortDirection);
            renderRankings();
            setupSorting();
        }

        // 랭킹 데이터 로드
        async function loadRankings() {
            try {
                console.log('Loading rankings...');
                
                // 모바일 환경에서의 타임아웃 설정 (10초)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(`${API_BASE_URL}/rankings`, {
                    signal: controller.signal,
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token') || ''}`
                    }
                });
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const allUsers = await response.json();
                
                // 공적이 0인 사용자들도 포함해서 모든 사용자 표시 (숨김 계정 제외)
                const users = (allUsers.length > 0 ? allUsers : []).filter(u => !HIDDEN_USERNAMES.has(u.username));

                // ⚡ 클라이언트 캐시 저장
                _clientRankingsCache = users;
                _clientRankingsCacheTime = Date.now();

                renderRankingsFromCache(users);
                
            } catch (error) {
                console.error('Error fetching ranking data:', error);
                
                // 모바일 환경에서의 상세한 에러 정보
                let errorMessage = '랭킹 데이터를 불러오는데 실패했습니다.';
                if (error.name === 'AbortError') {
                    errorMessage = '네트워크 요청이 시간 초과되었습니다. 인터넷 연결을 확인해주세요.';
                } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    errorMessage = '네트워크 연결에 문제가 있습니다. 인터넷 연결을 확인해주세요.';
                } else if (error.message.includes('401') || error.message.includes('403')) {
                    errorMessage = '인증이 만료되었습니다. 다시 로그인해주세요.';
                }
                
                const ministersTableBody = document.getElementById('ministersTableBody');
                const regularTableBody = document.getElementById('rankingTableBody');
                ministersTableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #e74c3c;">${errorMessage}</td></tr>`;
                regularTableBody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: #e74c3c;">${errorMessage}</td></tr>`;
                
                // 모바일 디버깅을 위한 추가 정보 표시
                if (/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                    console.log('📱 모바일 환경에서 에러 발생:', {
                        userAgent: navigator.userAgent,
                        error: error.message,
                        apiUrl: `${API_BASE_URL}/rankings`
                    });
                }
            }
        }

        // 랭킹 테이블 정렬 기능
        let currentSortColumn = 'score';
        let currentSortDirection = 'desc';
        let rankingData = [];

        // 정렬 함수
        function sortRankings(column, direction) {
            rankingData.sort((a, b) => {
                let aVal, bVal;
                
                switch (column) {
                    case 'rank':
                        aVal = a.rank || 999;
                        bVal = b.rank || 999;
                        break;
                    case 'username':
                        aVal = a.username.toLowerCase();
                        bVal = b.username.toLowerCase();
                        break;
                    case 'position':
                        aVal = a.position || '';
                        bVal = b.position || '';
                        break;
                    case 'submitted_count':
                        aVal = a.totalCount || 0;
                        bVal = b.totalCount || 0;
                        break;
                    case 'recommended_count':
                        aVal = a.totalVotes || 0;
                        bVal = b.totalVotes || 0;
                        break;
                    case 'approved_count':
                        aVal = a.approvedCount || 0;
                        bVal = b.approvedCount || 0;
                        break;
                    case 'reviewed_count':
                        aVal = a.reviewedCount || 0;
                        bVal = b.reviewedCount || 0;
                        break;
                    case 'approved_by_count':
                        aVal = a.approvedByCount || 0;
                        bVal = b.approvedByCount || 0;
                        break;
                    case 'attendance_count':
                        aVal = a.attendancePoints || 0;
                        bVal = b.attendancePoints || 0;
                        break;
                    case 'score':
                    default:
                        aVal = a.score || 0;
                        bVal = b.score || 0;
                        break;
                }
                
                if (typeof aVal === 'string') {
                    return direction === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                } else {
                    return direction === 'asc' ? aVal - bVal : bVal - aVal;
                }
            });
        }

        // 랭킹 테이블 렌더링 함수 (일반 사관만)
        function renderRankings() {
            const tableBody = document.getElementById('rankingTableBody');
            tableBody.innerHTML = '';
            
            if (rankingData.length === 0) {
                const row = document.createElement('tr');
                const cell = document.createElement('td');
                cell.colSpan = 8;
                cell.textContent = '일반 사관이 없습니다.';
                cell.style.textAlign = 'center';
                cell.style.color = '#95a5a6';
                row.appendChild(cell);
                tableBody.appendChild(row);
                return;
            }
            
            const currentUsername = localStorage.getItem('username');
            const frag = document.createDocumentFragment(); // ⚡ 리플로우 최소화

            rankingData.forEach((user, index) => {
                const row = document.createElement('tr');
                const rankClass = index < 3 ? `rank-${index + 1}` : '';
                const isCurrentUser = currentUsername && user.username === currentUsername;
                const userClass = isCurrentUser ? 'current-user' : '';
                const displayRank = user.rank || (index + 1);
                const displayPosition = normalizePosition(user.position) || getDetailedPosition(user.score || 0);

                const submittedScore = (user.totalCount || 0) * 3;
                const votesScore = (user.totalVotes || 0) * 1;
                const approvedScore = (user.approvedCount || 0) * 10;
                const attendanceScore = (user.attendancePoints || 0) * 1;
                const reviewScore = user.reviewScore || 0;
                const reviewCount = user.reviewedCount || Math.round(reviewScore / 5) || 0;

                row.innerHTML = `
                    <td class="${rankClass} ${userClass}">${displayRank}</td>
                    <td class="${userClass}">${user.username}${isCurrentUser ? ' 👑' : ''}</td>
                    <td class="${userClass}">${displayPosition}</td>
                    <td style="text-align: right;" class="${userClass}">${submittedScore}(${user.totalCount || 0})</td>
                    <td style="text-align: right;" class="${userClass}">${votesScore}(${user.totalVotes || 0})</td>
                    <td style="text-align: right;" class="${userClass}">${approvedScore}(${user.approvedCount || 0})</td>
                    <td style="text-align: right;" class="${userClass}">${reviewScore}(${reviewCount})</td>
                    <td style="text-align: right;" class="${userClass}">${attendanceScore}(${user.attendancePoints || 0})</td>
                    <td style="text-align: right;" class="${rankClass} ${userClass}"><strong>${user.score || 0}</strong></td>
                `;
                frag.appendChild(row);
            });
            tableBody.appendChild(frag); // ⚡ 한 번만 DOM에 삽입
        }

        // 헤더 클릭 이벤트 설정
        let sortingSetup = false;
        function setupSorting() {
            if (sortingSetup) return; // 이미 설정되었으면 중복 실행 방지
            sortingSetup = true;
            
            document.querySelectorAll('.sortable').forEach(header => {
                header.addEventListener('click', () => {
                    const column = header.dataset.sort;
                    
                    console.log('클릭한 컬럼: ' + column + ', 현재: ' + currentSortColumn + ', 방향: ' + currentSortDirection);
                    
                    // 기존 정렬 표시 제거
                    document.querySelectorAll('.sortable').forEach(h => {
                        h.classList.remove('sort-asc', 'sort-desc');
                    });
                    
                    // 정렬 방향 결정
                    if (currentSortColumn === column) {
                        // 같은 컬럼을 다시 클릭하면 방향 토글
                        currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        // 다른 컬럼을 클릭하면 해당 컬럼으로 변경하고 내림차순으로 시작
                        currentSortColumn = column;
                        currentSortDirection = 'desc';
                    }
                    
                    console.log('정렬 실행: ' + column + ' (' + currentSortDirection + ')');
                    
                    // 정렬 표시 추가
                    header.classList.add('sort-' + currentSortDirection);
                    
                    // 데이터 정렬 및 렌더링
                    sortRankings(column, currentSortDirection);
                    renderRankings();
                });
            });
        }

        // 사료 데이터 로드
        async function loadContributions() {
            try {
                const searchText = document.getElementById('searchInput').value.toLowerCase();
                const statusFilter = document.getElementById('statusFilter').value;
                const ownershipFilter = document.getElementById('ownershipFilter').value;
                
                // URL 파라미터로 전달된 토큰 처리 (새 탭 sessionStorage 미공유 문제 해결)
                const urlToken = new URLSearchParams(window.location.search).get('t');
                if (urlToken && !localStorage.getItem('token') && !sessionStorage.getItem('token')) {
                    sessionStorage.setItem('token', urlToken);
                }

                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                
                if (!token) {
                    document.getElementById('contributionsList').innerHTML = '<p style="text-align: center; color: #e74c3c;">로그인이 필요합니다.</p>';
                    return;
                }
                
                // 토큰에서 username 추출
                let currentUsername = null;
                try {
                    // UTF-8 디코딩 지원
                    const base64Url = token.split('.')[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                    currentUsername = JSON.parse(jsonPayload).username;
                } catch (e) {
                    console.error('토큰 파싱 실패:', e);
                }
                
                // URL 파라미터 확인 (user 파라미터가 있으면 검색어와 내 사료 필터 자동 설정)
                const urlParams = new URLSearchParams(window.location.search);
                const userParam = urlParams.get('user');
                
                if (userParam && !window.initialFilterApplied) {
                    document.getElementById('searchInput').value = userParam;
                    document.getElementById('ownershipFilter').value = 'all';
                    window.initialFilterApplied = true;
                    // 재귀 호출로 필터 적용
                    loadContributions();
                    return;
                }
                
                console.log('📚 사료 데이터 로딩...');
                
                const response = await fetch(`${API_BASE_URL}/contributions`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }
                
                const contributions = await response.json();
                
                // 필터링 로직 (클라이언트 측)
                let filteredContributions = contributions;
                
                // 1. 소유권 필터
                if (ownershipFilter === 'mine' && currentUsername) {
                    filteredContributions = filteredContributions.filter(item => item.username === currentUsername || item.submittedBy?.username === currentUsername);
                }
                
                // 2. 상태 필터
                if (statusFilter !== 'all') {
                    filteredContributions = filteredContributions.filter(item => item.status === statusFilter);
                }
                
                // 3. 검색어 필터
                if (searchText) {
                    filteredContributions = filteredContributions.filter(item => {
                        const name = (item.name || item.markerName || item.title || '').toLowerCase();
                        const content = (item.description || item.content || '').toLowerCase();
                        const submitter = (item.username || item.submittedBy?.username || '').toLowerCase();
                        return name.includes(searchText) || content.includes(searchText) || submitter.includes(searchText);
                    });
                }
                
                console.log('📌 필터링 된 사료: ' + filteredContributions.length + '개 (전체: ' + contributions.length + ')');
                
                // 전역 변수에 저장하여 상세 보기에서 활용
                window.loadedContributions = filteredContributions;
                
                const listContainer = document.getElementById('contributionsList');
                listContainer.innerHTML = '';
                
                if (filteredContributions.length === 0) {
                    listContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: #95a5a5;"><div style="font-size: 40px; margin-bottom: 10px;">📭</div>조건에 맞는 사료가 없습니다.</div>';
                    return;
                }
                
                filteredContributions.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'contribution-item';
                    div.style.backgroundColor = 'rgba(255,255,255,0.04)';
                    div.style.marginBottom = '10px';
                    div.style.padding = '14px 16px';
                    div.style.borderRadius = '8px';
                    div.style.borderLeft = '4px solid rgba(180,140,80,0.4)';
                    div.style.cursor = 'pointer';
                    div.style.transition = 'all 0.2s ease';
                    div.onmouseover = () => {
                        div.style.transform = 'translateX(4px)';
                        div.style.backgroundColor = 'rgba(255,255,255,0.07)';
                        div.style.borderLeftColor = 'rgba(180,140,80,0.85)';
                    };
                    div.onmouseout = () => {
                        div.style.transform = 'translateX(0)';
                        div.style.backgroundColor = 'rgba(255,255,255,0.04)';
                        div.style.borderLeftColor = 'rgba(180,140,80,0.4)';
                    };
                    
                    div.onclick = () => showContributionDetail(item._id);
                    
                    const statusClass = `status-${item.status}`;
                    const statusText = item.status === 'pending' ? '검토 대기' : 
                                      item.status === 'reviewed' ? '1차 검토완료' :
                                      item.status === 'approved' ? '최종 승인됨' : '거부됨';
                    
                    const statusBg = item.status === 'pending' ? 'rgba(230, 126, 34, 0.2)' : 
                                    item.status === 'reviewed' ? 'rgba(39, 174, 96, 0.2)' :
                                    item.status === 'approved' ? 'rgba(142, 68, 173, 0.2)' : 'rgba(192, 57, 43, 0.2)';
                    
                    const statusColor = item.status === 'pending' ? '#f39c12' : 
                                       item.status === 'reviewed' ? '#2ecc71' :
                                       item.status === 'approved' ? '#9b59b6' : '#e74c3c';
                    
                    // 데이터 안전 처리
                    const markerName = item.name || item.markerName || item.title || '제목 없음';

                            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);

                            <div style="color: #8fa0b0; font-size: 11px; margin-top: 5px;">Ctrl+Enter로 빠르게 등록</div>
                            ` : `<div style="color: #8fa0b0; font-size: 13px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 7px; text-align: center;">의견을 작성하려면 로그인하세요.</div>`}
                        </div>
                    </div>
                `;
                
                // 의견 목록 비동기 로드
                loadComments(contributionId);
                
                document.getElementById('contributionDetailModal').style.display = 'block';
            } catch (error) {
                console.error('❌ 사료 상세 보기 실패:', error);
                alert('사료 상세 정보를 표시하는데 실패했습니다.');
            }
        }

        // 필터 변경 이벤트
        if (document.getElementById('searchInput')) {
            document.getElementById('searchInput').addEventListener('input', debounce(loadContributions, 300));
        }
        if (document.getElementById('statusFilter')) {
            document.getElementById('statusFilter').addEventListener('change', loadContributions);
        }
        if (document.getElementById('ownershipFilter')) {
            document.getElementById('ownershipFilter').addEventListener('change', loadContributions);
        }
        
        // 디바운스 함수 (검색어 입력 시 과도한 요청 방지)
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), wait);
            };
        }

        // � 의견 목록 로드
        async function loadComments(contributionId) {
            const container = document.getElementById(`commentsList-${contributionId}`);
            if (!container) return;
            try {
                const response = await fetch(`${API_BASE_URL}/contributions/${contributionId}/comments`);
                if (!response.ok) throw new Error('조회 실패');
                const comments = await response.json();

                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                let currentUsername = '';
                let currentRole = '';
                if (token) {
                    try {
                        const base64Url = token.split('.')[1];
                        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                        const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
                            '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                        ).join(''));
                        const payload = JSON.parse(jsonPayload);
                        currentUsername = payload.username || '';
                        currentRole = payload.role || '';
                    } catch (e) {}
                }
                const isAdmin = currentRole === 'admin' || currentRole === 'superuser';

                if (comments.length === 0) {
                    container.innerHTML = '<div style="color: #95a5a6; font-size: 13px; padding: 10px 0;">아직 의견이 없습니다. 첫 번째 의견을 남겨보세요!</div>';
                    return;
                }

                container.innerHTML = comments.map(c => {
                    const canDelete = isAdmin || c.author === currentUsername;
                    const dateStr = c.createdAt ? new Date(c.createdAt).toLocaleString('ko-KR', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                    return `
                    <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(180,140,80,0.22); border-radius: 7px; padding: 11px 14px; margin-bottom: 8px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                            <span style="color: #a8c4d8; font-weight: 600; font-size: 13px;">👤 ${c.author}</span>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="color: #6a7f8e; font-size: 11px;">${dateStr}</span>
                                ${canDelete ? `<button onclick="deleteComment('${contributionId}', '${c._id}')" style="background: none; border: none; color: #c86050; cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 4px;" title="삭제">✕</button>` : ''}
                            </div>
                        </div>
                        <div style="color: #c8bdb2; font-size: 13px; line-height: 1.65; white-space: pre-wrap;">${c.text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                    </div>`;
                }).join('');
            } catch (error) {
                container.innerHTML = '<div style="color: #e74c3c; font-size: 13px;">의견을 불러오지 못했습니다.</div>';
            }
        }

        // 💬 의견 등록
        async function submitComment(contributionId) {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (!token) { alert('로그인이 필요합니다.'); return; }
            const textarea = document.getElementById(`commentInput-${contributionId}`);
            if (!textarea) return;
            const text = textarea.value.trim();
            if (!text) { alert('의견 내용을 입력하세요.'); return; }

            try {
                const response = await fetch(`${API_BASE_URL}/contributions/${contributionId}/comments`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                if (!response.ok) {
                    const err = await response.json();
                    alert(err.message || '의견 등록에 실패했습니다.');
                    return;
                }
                textarea.value = '';
                await loadComments(contributionId);
            } catch (error) {
                alert('의견 등록에 실패했습니다.');
            }
        }

        // 💬 의견 삭제
        async function deleteComment(contributionId, commentId) {
            if (!confirm('이 의견을 삭제하시겠습니까?')) return;
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (!token) { alert('로그인이 필요합니다.'); return; }

            try {
                const response = await fetch(`${API_BASE_URL}/contributions/${contributionId}/comments/${commentId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) {
                    const err = await response.json();
                    alert(err.message || '삭제에 실패했습니다.');
                    return;
                }
                await loadComments(contributionId);
            } catch (error) {
                alert('삭제에 실패했습니다.');
            }
        }

        // �🚩 [추가] 사료 추천 함수
        async function voteContribution(contributionId) {
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                if (!token) {
                    alert('로그인이 필요합니다.');
                    return;
                }
                
                const response = await fetch(`${API_BASE_URL}/contributions/${contributionId}/vote`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('추천되었습니다!');
                    
                    // 🚩 [수정] 모달을 닫지 않고 UI만 업데이트
                    // 추천 버튼 숨기기
                    const voteBtn = document.querySelector(`button[onclick="voteContribution('${contributionId}')"]`);
                    if (voteBtn) {
                        voteBtn.style.display = 'none';
                    }
                    
                    // 추천 수 업데이트
                    const detailContent = document.getElementById('contributionDetailContent');
                    if (detailContent && result.votes !== undefined) {
                        const votesText = detailContent.querySelector('p:has(strong)');
                        if (votesText && votesText.textContent.includes('추천 수')) {
                            votesText.innerHTML = `<strong>추천 수:</strong> ${result.votes}명`;
                        }
                    }
                    
                    // 목록도 새로고침
                    loadContributions();
                } else {
                    alert(result.message || '추천에 실패했습니다.');
                }
            } catch (error) {
                console.error('❌ 추천 실패:', error);
                alert('추천에 실패했습니다.');
            }
        }

        // 🚩 [추가] 사료 검토 함수
        async function reviewContribution(contributionId, action) {
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                if (!token) {
                    alert('로그인이 필요합니다.');
                    return;
                }
                
                let comment = '';
                // approved 또는 rejected로 넘어옴
                if (action === 'rejected' || action === 'reject') {
                    comment = prompt('거부 사유를 입력하세요:');
                    if (!comment) return;
                }
                
                // action이 'approve'나 'approved'이면 'approved'로, 'reject'나 'rejected'면 'rejected'로 통일
                const status = (action === 'approve' || action === 'approved') ? 'approved' : 'rejected';
                
                const response = await fetch(`${API_BASE_URL}/contributions/${contributionId}/review`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: status, comment })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert(status === 'approved' ? '검토 승인되었습니다!' : '검토 거부되었습니다.');
                    
                    // � [추가] 부모 창(index.html)에 실시간 업데이트 알림
                    if (window.opener && !window.opener.closed) {
                        window.opener.postMessage({
                            type: 'contributionReviewed',
                            contributionId: contributionId,
                            newStatus: status
                        }, '*');
                        console.log(`✅ [ranking.html → index.html] 검토 완료 메시지 전송: ${contributionId} → ${status}`);
                    }
                    
                    // �🚩 [수정] 모달을 닫고 목록 새로고침 (상태가 변경되므로)
                    document.getElementById('contributionDetailModal').style.display = 'none';
                    loadContributions();
                } else {
                    alert(result.message || '검토에 실패했습니다.');
                }
            } catch (error) {
                console.error('❌ 검토 실패:', error);
                alert('검토에 실패했습니다.');
            }
        }

        // 🚩 [추가] 사료 최종 승인 함수
        async function approveContribution(contributionId) {
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                if (!token) {
                    alert('로그인이 필요합니다.');
                    return;
                }
                
                if (!confirm('이 사료를 최종 승인하시겠습니까?')) {
                    return;
                }
                
                const response = await fetch(`${API_BASE_URL}/contributions/${contributionId}/approve`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('최종 승인되었습니다!');
                    
                    // 🚩 [수정] 모달을 닫고 목록 새로고침 (상태가 변경되므로)
                    document.getElementById('contributionDetailModal').style.display = 'none';
                    loadContributions();
                } else {
                    alert(result.message || '승인에 실패했습니다.');
                }
            } catch (error) {
                console.error('❌ 승인 실패:', error);
                alert('승인에 실패했습니다.');
            }
        }

        // 모달 닫기
        document.getElementById('closeDetailBtn').addEventListener('click', () => {
            document.getElementById('contributionDetailModal').style.display = 'none';
        });

        document.getElementById('rankInfoBtn').addEventListener('click', () => {
            // 팝업 창 크기 및 위치 설정
            const width = 900;
            const height = 700;
            const left = (screen.width - width) / 2;
            const top = (screen.height - height) / 2;
            
            window.open(
                'rank_info.html',
                'rankInfoWindow',
                `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`
            );
        });

        // 모달 배경 클릭 시 닫기
        window.addEventListener('click', (e) => {
            const detailModal = document.getElementById('contributionDetailModal');
            if (e.target === detailModal) {
                detailModal.style.display = 'none';
            }
        });

        // 초기 로드

        document.addEventListener('DOMContentLoaded', async () => {
            loadRankings();
            
            // 🚩 [수정] URL 파라미터로 contributionId가 전달된 경우 자동으로 모달 열기
            const urlParams = new URLSearchParams(window.location.search);
            const contributionId = urlParams.get('contributionId');
            if (contributionId) {
                console.log('🔍 URL에서 contributionId 감지:', contributionId);
                
                // 사료 탭으로 전환 (data-tab="contributions" 버튼 클릭)
                const contributionsTabBtn = document.querySelector('.tab-button[data-tab="contributions"]');
                if (contributionsTabBtn) {
                    contributionsTabBtn.click();
                } else {
                    console.error('❌ 사료 탭 버튼을 찾을 수 없습니다');
                }
                
                // 사료 데이터 로딩 완료 대기
                await loadContributions();
                
                // 모달 열기
                setTimeout(() => {
                    console.log('🔍 사료 상세 모달 열기 시도:', contributionId);
                    showContributionDetail(contributionId);
                }, 100);
            }
        });
        
        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', () => {
            // 기본 탭 활성화 및 데이터 로드
            loadRankings();
            
            // 기본 정렬 표시 (점수 내림차순)
            const scoreHeader = document.querySelector('.sortable[data-sort="score"]');
            if (scoreHeader) {
                scoreHeader.classList.add('sort-desc');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const rankInfoBtn = document.getElementById('rankInfoBtn');
            if (rankInfoBtn) {
                rankInfoBtn.addEventListener('click', async () => {
                    try {
                        console.log('직급 안내 버튼 클릭됨');
                        await loadRankings();
                        alert('랭킹 데이터를 성공적으로 불러왔습니다.');
                    } catch (error) {
                        console.error('랭킹 데이터를 불러오는 중 오류 발생:', error);
                        alert('랭킹 데이터를 불러오는 데 실패했습니다. 다시 시도해주세요.');
                    }
                });
            }
        });
    </script>
</body>
</html>
