<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>임관 - 고려만리지도 (高麗萬里地圖)</title>
    <meta name="robots" content="noindex,nofollow,noarchive">
    <!-- 🚩 [추가] 모바일 반응형을 위한 뷰포트 메타 태그 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 🚩 [추가] 브라우저 탭 아이콘(파비콘) 설정 -->
    <link rel="icon" type="image/jpg" href="https://pds.joongang.co.kr/news/component/htmlphoto_mmdata/200609/htm_20060904073327a000a010-001.JPG">
    <!-- 🚩 [추가] Google Fonts (Noto Serif KR) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 🚩 [수정] Nanum Brush Script 글꼴 추가 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Yeon+Sung&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                url('https://i.pinimg.com/1200x/ea/ff/c5/eaffc5798174bca27342dc968d58a61a.jpg');
            background-size: cover, cover, 100% 100%;
            background-position: center, center, center;
            background-repeat: no-repeat, no-repeat, no-repeat;
            color: #e1dede;
            font-family: 'Noto Serif KR', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* 임관 문서 스타일 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 30px,
                    rgba(255, 255, 255, 0.03) 30px,
                    rgba(255, 255, 255, 0.03) 31px
                );
            pointer-events: none;
        }

        .register-container {
            background: linear-gradient(145deg, rgba(44, 62, 80, 0.95), rgba(52, 73, 94, 0.95));
            border: 2px solid rgba(241, 196, 15, 0.3);
            border-radius: 15px;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 30px rgba(241, 196, 15, 0.1);
            width: 100%;
            max-width: 600px;
            padding: 50px 40px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 임관 문서 코너 장식 */
        .register-container::before,
        .register-container::after {
            content: '❋';
            position: absolute;
            color: rgba(241, 196, 15, 0.6);
            font-size: 24px;
            font-weight: bold;
        }

        .register-container::before {
            top: 15px;
            left: 15px;
        }

        .register-container::after {
            bottom: 15px;
            right: 15px;
        }

        h1 {
            font-family: 'Yeon Sung', cursive;
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #f1c40f;
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(241, 196, 15, 0.3);
            letter-spacing: 2px;
        }

        .hanja-title {
            font-family: 'Yeon Sung', cursive;
            font-weight: 400;
            font-size: 0.8em;
            color: #ecf0f1;
            opacity: 0.8;
        }

        .site-description {
            font-size: 16px;
            color: #bdc3c7;
            margin-bottom: 40px;
            line-height: 1.8;
            font-style: italic;
            border-left: 3px solid rgba(241, 196, 15, 0.5);
            padding-left: 20px;
            position: relative;
        }

        .site-description::before {
            content: '"';
            position: absolute;
            left: -10px;
            top: -5px;
            font-size: 40px;
            color: rgba(241, 196, 15, 0.3);
            font-family: serif;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(241, 196, 15, 0.2);
        }

        .form-section h3 {
            color: #f1c40f;
            font-size: 1.2em;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ecf0f1;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 8px;
            border: 2px solid rgba(241, 196, 15, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #ecf0f1;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .input-group input:focus {
            outline: none;
            border-color: #f1c40f;
            box-shadow: 
                0 0 15px rgba(241, 196, 15, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-group input::placeholder {
            color: rgba(236, 240, 241, 0.5);
        }

        button {
            width: 100%;
            padding: 18px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            color: #2c3e50;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(241, 196, 15, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(241, 196, 15, 0.4);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        #message {
            margin-top: 20px;
            color: #e74c3c;
            font-weight: 500;
            min-height: 20px;
        }

        .login-link {
            margin-top: 30px;
            font-size: 14px;
            color: #bdc3c7;
            border-top: 1px solid rgba(241, 196, 15, 0.2);
            padding-top: 20px;
        }

        .login-link a {
            color: #f1c40f;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #f39c12;
            text-shadow: 0 0 8px rgba(241, 196, 15, 0.5);
        }

        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .register-container {
                padding: 30px 20px;
                margin: 20px;
                max-width: none;
            }

            h1 {
                font-size: 2em;
            }

            .form-section {
                padding: 20px;
            }

            .input-group input {
                padding: 12px 15px;
                font-size: 16px;
            }

            button {
                padding: 15px 25px;
                font-size: 16px;
            }
        }

        /* 임관 문서 스크롤 효과 */
        @media (min-width: 769px) {
            body {
                background-attachment: fixed;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>새로운 사관(史官)에 임관(任官)</h1>
        <p class="site-description">
            고려 왕조의 사관이 되어 잃어버린 대륙의 역사를 기록하고,<br>
            민족의 기억을 영원히 보존하는 신성한 임무를 수행하십시오.
        </p>

        <div class="form-section">
            <h3>📜 임관 서류 작성</h3>
            <form id="registerForm">
                <div class="input-group">
                    <label for="username">사관(史官)의 존함</label>
                    <input type="text" id="username" name="username" placeholder="역사를 기록할 사관의 이름을 입력하십시오" required>
                </div>
                <div class="input-group">
                    <label for="email">사관의 서신 주소</label>
                    <input type="email" id="email" name="email" placeholder="중요한 역사적 소식을 전달받을 주소" required>
                </div>
                <div class="input-group">
                    <label for="password">임관 통행패 암호</label>
                    <input type="password" id="password" name="password" placeholder="역사 기록의 비밀을 지킬 암호" required>
                </div>
                <button type="submit">⚔️ 임관을 선서합니다</button>
            </form>
        </div>

        <p id="message"></p>
        <div class="login-link">
            이미 고려의 사관으로 임관하셨습니까? <a href="login.html">사관청 입장</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api'; // 💡 상대 경로로 변경

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('message');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message);
                
                alert('임관이 완료되었습니다. 사관으로 입장하실 수 있습니다.');
                window.location.href = 'login.html';
            } catch (error) {
                messageEl.textContent = error.message;
            }
        });
    </script>
</body>
</html>
