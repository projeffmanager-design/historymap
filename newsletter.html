<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사관청 소식 – 고려만리지도</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;600&display=swap');

    :root {
      --bg-deep:      #faf8f2;
      --bg-panel:     #f5f2e8;
      --bg-sidebar:   #f4f0e6;
      --bg-card:      #f0ece0;
      --bg-hover:     #e8e3d2;
      --bg-active:    #d5ccb4;
      --gold:         #7a5208;
      --gold-bright:  #5a3a04;
      --gold-dim:     #a87820;
      --gold-border:  #c8a050;
      --text-main:    #1e1808;
      --text-muted:   #7a6840;
      --text-sub:     #3e3018;
      --border:       #c8bea0;
      --border-light: #d8ceb0;
      --accent:       #8a3018;
      --scrollbar:    #c0b088;
      --header-h:     62px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══════════════════════════════
       팝업 모드 — body는 투명, 실제 콘텐츠는 .nl-popup 안에
    ══════════════════════════════ */
    body {
      background: transparent;
      color: var(--text-main);
      font-family: 'Nanum Myeongjo', 'Noto Serif KR', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 팝업 오버레이 배경 (팝업 모드일 때만 표시) */
    body.popup-mode {
      background: rgba(0,0,0,0.72);
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 팝업 컨테이너 */
    .nl-popup {
      width: 92vw;
      max-width: 1100px;
      height: 88vh;
      background: var(--bg-deep);
      border: 1px solid var(--gold-border);
      border-radius: 12px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.8), 0 0 0 1px rgba(212,168,67,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* 팝업 닫기 버튼 */
    .nl-close-btn {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 20;
      background: rgba(240,234,218,0.92);
      border: 1px solid var(--gold-border);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      color: var(--gold-dim);
      transition: all 0.18s;
      line-height: 1;
      padding: 0;
    }
    .nl-close-btn:hover {
      background: var(--bg-hover);
      border-color: var(--gold);
      color: var(--gold-bright);
      box-shadow: 0 2px 8px rgba(120,80,8,0.18);
    }

    /* 일반 페이지 모드일 때 전체 레이아웃 */
    body:not(.popup-mode) {
      background: var(--bg-deep);
      min-height: 100vh;
    }
    body:not(.popup-mode) .nl-popup {
      width: 100%;
      max-width: 100%;
      height: 100vh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
    body:not(.popup-mode) .nl-close-btn {
      display: none;
    }

    /* ══════════════════════════════
       헤더 — 고정 + 화려한 디자인
    ══════════════════════════════ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: linear-gradient(135deg, #e8dfc8 0%, #f0e8d0 50%, #ece5cc 100%);
      border-bottom: 1px solid var(--gold-border);
      box-shadow: 0 2px 16px rgba(0,0,0,0.6), 0 1px 0 rgba(212,168,67,0.15);
      padding: 0 52px 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
    }

    /* 헤더 좌우 황금 장식선 */
    header::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-dim) 20%, var(--gold) 50%, var(--gold-dim) 80%, transparent 100%);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* 제목 앞 문장(文章) 문양 */
    .header-emblem {
      width: 38px;
      height: 38px;
      border: 1.5px solid var(--gold-dim);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      background: radial-gradient(circle, #e8dfc8 0%, #d8ceb0 100%);
      box-shadow: 0 0 8px rgba(212,168,67,0.25), inset 0 1px 2px rgba(255,220,100,0.1);
      flex-shrink: 0;
    }

    .title-group h1 {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 60%, #6a4808 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.06em;
      line-height: 1.2;
    }
    .title-group p {
      font-size: 0.73rem;
      color: var(--text-muted);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    header .back-btn {
      display: none;
    }

    /* ══════════════════════════════
       본문 레이아웃
    ══════════════════════════════ */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100% - var(--header-h));
    }

    /* ══════════════════════════════
       사이드바 — 탑바 고정 + 디자인
    ══════════════════════════════ */
    aside {
      width: 240px;
      min-width: 190px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }

    /* 사이드바 탑바 — 고정 */
    .sidebar-topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(180deg, #ece6d6 0%, #e8e2cc 100%);
      border-bottom: 1px solid var(--border-light);
      padding: 14px 16px 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .sidebar-topbar-inner {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-topbar-icon {
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .sidebar-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .sidebar-count {
      margin-left: auto;
      font-size: 0.68rem;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      font-family: monospace;
    }

    /* 탑바 아래 황금 구분선 */
    .sidebar-topbar::after {
      content: '';
      display: block;
      height: 1px;
      margin-top: 10px;
      background: linear-gradient(90deg, transparent, var(--gold-dim) 40%, var(--gold-dim) 60%, transparent);
      opacity: 0.4;
    }

    /* 사이드바 스크롤 영역 */
    .sidebar-scroll {
      overflow-y: auto;
      flex: 1;
      padding: 10px 10px 24px;
    }

    /* 연/월 그룹 헤더 */
    .sidebar-group-header {
      font-size: 0.67rem;
      font-weight: 700;
      color: var(--gold-dim);
      letter-spacing: 0.1em;
      padding: 10px 8px 4px;
      opacity: 0.8;
    }

    aside ul {
      list-style: none;
      padding: 0;
    }
    aside ul li {
      margin-bottom: 3px;
    }
    aside ul li button {
      width: 100%;
      text-align: left;
      background: none;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 9px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text-sub);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.4;
      position: relative;
    }

    /* 호 번호 뱃지 */
    aside ul li button::before {
      content: attr(data-idx);
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.62rem;
      color: var(--text-muted);
      font-family: monospace;
      opacity: 0.6;
    }

    aside ul li button .issue-title {
      display: block;
      font-weight: 600;
      padding-right: 28px;
    }
    aside ul li button .issue-date {
      display: block;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    aside ul li button:hover {
      background: var(--bg-hover);
      border-color: var(--border-light);
      color: var(--text-main);
    }
    aside ul li button.active {
      background: linear-gradient(135deg, var(--bg-active) 0%, #d0c8a8 100%);
      border-color: var(--gold-dim);
      color: var(--gold);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.3), 0 1px 4px rgba(212,168,67,0.08);
    }
    aside ul li button.active::before { opacity: 0; }
    aside ul li button.active .issue-title::before {
      content: '▶ ';
      font-size: 0.6rem;
      opacity: 0.7;
    }
    aside ul li button.active .issue-date { color: var(--gold-dim); }

    /* ── 메인 콘텐츠 ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 36px 48px;
      background: var(--bg-deep);
    }

    #loading-msg {
      color: var(--text-muted);
      font-size: 1rem;
      text-align: center;
      margin-top: 60px;
    }

    /* ── 마크다운 렌더링 스타일 ── */
    #md-content {
      max-width: 780px;
      margin: 0 auto;
      line-height: 1.85;
    }
    #md-content h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--gold);
      border-bottom: 2px solid var(--gold-dim);
      padding-bottom: 10px;
      margin-bottom: 24px;
    }
    #md-content h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gold);
      border-left: 4px solid var(--gold-dim);
      padding-left: 12px;
      margin: 36px 0 14px;
    }
    #md-content h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #5a3a10;
      margin: 24px 0 8px;
    }
    #md-content p {
      margin-bottom: 12px;
      color: var(--text-main);
    }
    #md-content ul, #md-content ol {
      margin: 8px 0 16px 22px;
    }
    #md-content li {
      margin-bottom: 5px;
    }
    #md-content strong {
      color: #7a3a00;
      font-weight: 700;
    }
    #md-content em {
      color: var(--text-muted);
      font-style: italic;
    }
    #md-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }
    #md-content blockquote {
      border-left: 3px solid var(--gold-dim);
      margin: 16px 0;
      padding: 8px 16px;
      background: var(--bg-card);
      border-radius: 0 6px 6px 0;
      color: var(--text-muted);
    }
    #md-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.9rem;
    }
    #md-content table th {
      background: var(--bg-card);
      color: var(--gold);
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    #md-content table td {
      border: 1px solid var(--border);
      padding: 7px 12px;
    }
    #md-content table tr:nth-child(even) td {
      background: var(--bg-panel);
    }
    #md-content code {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 0.85em;
      color: #5050c0;
    }

    /* ── 스크롤바 ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

    /* ── 모바일 반응형 ── */
    @media (max-width: 680px) {
      .nl-popup { width: 100%; height: 100%; border-radius: 0; }
      header { padding: 0 46px 0 14px; height: auto; min-height: 56px; }
      .title-group h1 { font-size: 1.05rem; }
      aside { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
      .layout { flex-direction: column; height: auto; overflow: visible; }
      main { padding: 20px 16px; overflow-y: visible; }
      #md-content { padding: 0; }
    }
  </style>
</head>
<body>

<div class="nl-popup" id="nl-popup">
  <!-- 닫기 버튼 (팝업 모드일 때만 동작) -->
  <button class="nl-close-btn" id="nl-close-btn" title="닫기">✕</button>

<header>
  <div class="header-left">
    <div class="header-emblem">📜</div>
    <div class="title-group">
      <h1>사관청(史館廳) 소식</h1>
      <p>고려만리지도 사관들의 활동 보고서</p>
    </div>
  </div>
</header>

<div class="layout">
  <aside>
    <!-- 고정 탑바 -->
    <div class="sidebar-topbar">
      <div class="sidebar-topbar-inner">
        <span class="sidebar-topbar-icon">🗂</span>
        <span class="sidebar-label">발행 목록</span>
        <span class="sidebar-count" id="issue-count">…</span>
      </div>
    </div>
    <!-- 스크롤 목록 -->
    <div class="sidebar-scroll">
      <ul id="issue-list">
        <li><em style="color:var(--text-muted);font-size:0.8rem;padding:10px 12px;display:block;">불러오는 중…</em></li>
      </ul>
    </div>
  </aside>

  <main>
    <div id="loading-msg">← 좌측에서 호를 선택하세요.</div>
    <div id="md-content" style="display:none;"></div>
  </main>
</div>
</div><!-- /.nl-popup -->

<script>
(async () => {
  const listEl   = document.getElementById('issue-list');
  const loadMsg  = document.getElementById('loading-msg');
  const mdEl     = document.getElementById('md-content');

  // ── 팝업 모드 감지 및 초기화 ──
  // index.html에서 iframe으로 열리거나, window.opener가 있으면 팝업 모드
  const isPopup = window.self !== window.top || !!window.opener || (new URLSearchParams(location.search).get('popup') === '1');
  if (isPopup) {
    document.body.classList.add('popup-mode');
  }

  // 닫기 버튼
  const closeBtn = document.getElementById('nl-close-btn');
  if (closeBtn) {
    closeBtn.addEventListener('click', () => {
      if (isPopup && window.self !== window.top) {
        // iframe 팝업: 부모에게 닫기 메시지
        window.parent.postMessage({ type: 'nl-close' }, '*');
      } else if (window.opener) {
        window.close();
      } else {
        // 직접 접근 시에는 숨기기
        document.body.classList.remove('popup-mode');
      }
    });
  }

  // 오버레이 배경 클릭 시 닫기 (팝업 모드에서 .nl-popup 바깥 클릭)
  document.body.addEventListener('click', (e) => {
    if (isPopup && e.target === document.body) {
      if (window.self !== window.top) {
        window.parent.postMessage({ type: 'nl-close' }, '*');
      }
    }
  });

  // ESC 키 닫기
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isPopup) {
      if (window.self !== window.top) {
        window.parent.postMessage({ type: 'nl-close' }, '*');
      } else if (window.opener) {
        window.close();
      }
    }
  });

  // ── 뉴스레터 목록 로드 ──
  let issues = [];
  try {
    const res = await fetch('/api/newsletter');
    issues = await res.json();
  } catch (e) {
    listEl.innerHTML = '<li style="color:#f88;padding:10px 12px;font-size:0.82rem;">목록을 불러올 수 없습니다.</li>';
    return;
  }

  // 사이드바 렌더링 (최신호가 위로 오도록 역순)
  listEl.innerHTML = '';
  const reversed = [...issues].reverse();
  const countEl = document.getElementById('issue-count');
  if (countEl) countEl.textContent = `${reversed.length}호`;

  reversed.forEach((issue, idx) => {
    const li  = document.createElement('li');
    const btn = document.createElement('button');
    btn.dataset.slug = issue.slug;
    btn.dataset.idx = `#${reversed.length - idx}`;
    btn.innerHTML = `<span class="issue-title">${issue.title}</span><span class="issue-date">${formatDate(issue.date)}</span>`;
    btn.addEventListener('click', () => loadIssue(issue, btn));
    li.appendChild(btn);
    listEl.appendChild(li);
    // 첫 번째 항목(= 가장 최신호) 자동 로드
    if (idx === 0) btn.click();
  });

  // ── 뉴스레터 내용 로드 ──
  async function loadIssue(issue, clickedBtn) {
    // 활성 상태 전환
    listEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    clickedBtn.classList.add('active');

    loadMsg.style.display = 'block';
    loadMsg.textContent   = '불러오는 중…';
    mdEl.style.display    = 'none';

    try {
      const res = await fetch(`/api/newsletter/${issue.slug}`);
      if (!res.ok) throw new Error('404');
      const mdText = await res.text();
      mdEl.innerHTML = marked.parse(mdText);
      mdEl.style.display  = 'block';
      loadMsg.style.display = 'none';
      // 페이지 상단으로 스크롤
      document.querySelector('main').scrollTop = 0;
    } catch (e) {
      loadMsg.textContent = '내용을 불러올 수 없습니다.';
    }
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
  }
})();
</script>

</body>
</html>
