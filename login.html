<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 고려만리지도 (高麗萬里地圖)</title>
    <!-- 🚩 [추가] 모바일 반응형을 위한 뷰포트 메타 태그 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 🚩 [추가] 브라우저 탭 아이콘(파비콘) 설정 -->
    <link rel="icon" type="image/jpg" href="https://pds.joongang.co.kr/news/component/htmlphoto_mmdata/200609/htm_20060904073327a000a010-001.JPG">
    <!-- 🚩 [추가] Google Fonts (Noto Serif KR) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 🚩 [수정] Nanum Brush Script 글꼴 추가 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Yeon+Sung&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #130000;
            background-image: url(''), url('https://i.pinimg.com/1200x/ea/ff/c5/eaffc5798174bca27342dc968d58a61a.jpg');
            background-size: 0%, 100%;
            background-position: 80% center, 80% center;
            background-repeat: no-repeat, no-repeat;
            color: #e1dede;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: space-around; /* 🚩 [수정] 양쪽 정렬 */
            align-items: center;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }
        .login-container {
            background: rgba(19, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            width: 380px;
            max-height: 85vh;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 0;
            backdrop-filter: blur(8px);
        }
        h1 {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.8em;
            margin-bottom: 15px;
            color: #f5e9d2;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        /* 🚩 [추가] 한자 제목을 위한 붓글씨 폰트 스타일 */
        .hanja-title {
            font-family: 'Yeon Sung', cursive;
            font-weight: 400;
            font-size: 0.85em;
            opacity: 0.9;
        }
        .site-description {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        h2 {
            margin-bottom: 12px;
        }
        .input-group {
            margin-bottom: 10px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 4px;
            color: #e1dede;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #666;
            background-color: rgba(13, 13, 13, 0.8);
            color: #ecf0f1;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        .input-group.checkbox-group {
            flex-direction: row;
            align-items: center;
            margin-bottom: 12px;
        }
        .input-group.checkbox-group input { width: auto; margin-right: 8px; }
        .input-group.checkbox-group label { margin-bottom: 0; font-size: 13px; }
        .input-group input:focus {
            outline: none;
            border-color: #059be6;
            box-shadow: 0 0 8px rgba(5, 155, 230, 0.4);
        }
        button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background-color: #059be6;
            color: rgb(255, 255, 255);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        button:hover {
            background-color: #0476c7;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(5, 155, 230, 0.3);
        }
        #guestLoginBtn {
            background-color: #27ae60;
            margin-top: 6px;
        }
        #guestLoginBtn:hover {
            background-color: #229954;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }
        #message {
            margin-top: 10px;
            color: #f39c12;
            font-size: 13px;
        }
        .extra-links {
            margin-top: 12px;
            font-size: 12px;
        }
        .extra-links a {
            color: #59b3f4;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .extra-links a:hover {
            color: #87ceeb;
            text-decoration: underline;
        }
        /* 🚩 [추가] 오른쪽 이미지 컨테이너 스타일 */
        .right-image-container {
            width: 40%;
            text-align: center;
        }
        .right-image-container img {
            max-width: 80%;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }

        /* 🚩 [추가] 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            body {
                flex-direction: column; /* 세로로 쌓기 */
                justify-content: center; /* 중앙 정렬 */
                padding: 20px;
                overflow-y: auto; /* 내용이 길어지면 스크롤 허용 */
            }

            .login-container {
                width: 90%; /* 너비를 90%로 조정 */
                max-width: 400px;
                height: auto; /* 높이를 자동으로 조정 */
                padding: 25px; /* 패딩 조정 */
                margin-left: 0;
                backdrop-filter: blur(10px); /* 블러 효과 강화 */
                background: rgba(19, 0, 0, 0.85); /* 배경을 약간 더 진하게 */
            }

            /* 모바일에서는 로고 이미지를 숨겨서 로그인 폼에 집중 */
            .right-image-container {
                display: none;
            }

            h1 {
                font-size: 1.6em; /* 제목 폰트 크기 조정 */
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>고려만리지도 사관 등청</h1>
        <p class="site-description">
            📜한반도에 갇힌 역사를 넘어, 실제 지도로 우리 민족의 잃어버린 대륙의 기억을 되찾습니다.
        </p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">사관(史官)의 이름</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">통행패를 보여주세요</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="input-group checkbox-group">
                <label>로그인 상태 유지 <input type="checkbox" id="rememberMe" name="rememberMe"></label>
            </div>
            <button type="submit">고려의 사관(史官)으로 입장</button>
            <!-- 🚩 [추가] 게스트 로그인 버튼 -->
            <button type="button" id="guestLoginBtn">송나라 사신 서긍의 염탐</button>
        </form>
        <p id="message"></p>
        <div class="extra-links">
            계정이 없으신가요? <a href="register.html">자신만의 사관(史官) 인물 만들기</a>
        </div>
    </div>
    <div class="right-image-container">
        <img src="https://github.com/projeffmanager-design/img/blob/main/%E1%84%80%E1%85%A9%E1%84%85%E1%85%A7%E1%84%86%E1%85%A1%E1%86%AB%E1%84%85%E1%85%B5%E1%84%8C%E1%85%B5%E1%84%83%E1%85%A9white.png?raw=true" alt="고려만리지도 로고">
    </div>

    <script>
        const API_BASE_URL = '/api'; // 💡 상대 경로로 변경

        let _isLoggingIn = false; // 중복 로그인 요청 방지 플래그

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (_isLoggingIn) return; // 이미 처리 중이면 무시
            _isLoggingIn = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const messageEl = document.getElementById('message');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || '로그인에 실패했습니다.');
                }

                // 🚩 [수정] '로그인 상태 유지' 선택 여부에 따라 토큰 저장 위치 변경
                if (rememberMe) {
                    localStorage.setItem('token', data.token);
                } else {
                    sessionStorage.setItem('token', data.token);
                }

                // 🚩 [수정] 로그인 알림 정보 저장 (등청 멘트 + 출석 포인트)
                sessionStorage.setItem('_loginNotice', JSON.stringify({
                    username: data.username,
                    position: data.position,
                    attendancePoints: data.attendancePoints || 0
                }));
                sessionStorage.removeItem('_attendanceNotice'); // 구버전 키 정리
                
                // 🚀 [v2.0.5] 로딩 메시지 표시 후 리디렉션
                messageEl.textContent = '✅ 로그인 성공! 역사의 문을 여는 중...';
                messageEl.style.color = '#4CAF50';
                
                // 약간의 딜레이 후 리디렉션 (사용자에게 피드백 제공)
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 300);

            } catch (error) {
                messageEl.textContent = error.message;
                _isLoggingIn = false; // 실패 시 플래그 리셋 (재시도 가능하게)
                if (submitBtn) submitBtn.disabled = false;
            }
        });

        // 🚩 [추가] 게스트 로그인 버튼 이벤트 핸들러
        document.getElementById('guestLoginBtn').addEventListener('click', async () => {
            const messageEl = document.getElementById('message');
            try {
                const response = await fetch(`${API_BASE_URL}/auth/guest-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    // 응답이 JSON인지 확인 (404 에러 시 HTML이 반환될 수 있음)
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        const data = await response.json();
                        throw new Error(data.message || '게스트 로그인에 실패했습니다.');
                    } else {
                        throw new Error(`서버 연결 오류 (${response.status}): API 경로를 찾을 수 없습니다. 서버가 실행 중인지 확인하세요.`);
                    }
                }

                const data = await response.json();

                // 게스트는 세션 스토리지에 저장 (브라우저 종료 시 로그아웃)
                sessionStorage.setItem('token', data.token);
                
                // 🚀 [v2.0.5] 로딩 메시지 표시 후 리디렉션
                messageEl.textContent = '✅ 게스트로 입장! 역사의 문을 여는 중...';
                messageEl.style.color = '#4CAF50';
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 300);

            } catch (error) {
                messageEl.textContent = error.message;
            }
        });
    </script>

    <!-- 우하단 앱 버전 표기 -->
    <div id="login-app-version" style="
        position: fixed;
        bottom: 14px;
        right: 18px;
        font-size: 11px;
        color: rgba(255,255,255,0.28);
        font-family: 'Noto Serif KR', serif;
        letter-spacing: 0.04em;
        pointer-events: none;
        user-select: none;
    "></div>
    <script>
        // 서버에서 버전 읽기 (index.html의 CONFIG.APP_VERSION과 동일하게 유지)
        fetch('/api/app-version').then(r => r.json()).then(d => {
            const el = document.getElementById('login-app-version');
            if (el && d.version) el.textContent = 'v' + d.version;
        }).catch(() => {
            // fallback: 하드코딩 버전
            const el = document.getElementById('login-app-version');
            if (el) el.textContent = 'v3.6.65';
        });
    </script>
</body>
</html>
