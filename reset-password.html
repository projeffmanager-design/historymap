<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정 - 고려만리지도 (高麗萬里地圖)</title>
    <meta name="robots" content="noindex,nofollow,noarchive">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="https://pds.joongang.co.kr/news/component/htmlphoto_mmdata/200609/htm_20060904073327a000a010-001.JPG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Yeon+Sung&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #130000;
            background-image: linear-gradient(135deg, rgba(19,0,0,.94), rgba(44,10,10,.94));
            background-size: 100%;
            background-position: 80% center;
            background-repeat: no-repeat;
            color: #e1dede;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }
        .container {
            background: rgba(19, 0, 0, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 36px 32px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            width: 380px;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        h1 {
            font-family: 'Yeon Sung', cursive;
            font-size: 1.7em;
            color: #f5e9d2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            margin-bottom: 6px;
        }
        .subtitle {
            font-family: 'Noto Serif KR', serif;
            font-size: 13px;
            color: #bbb;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 14px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #e1dede;
            font-size: 13px;
            font-family: 'Noto Serif KR', serif;
        }
        .input-group input {
            width: 100%;
            padding: 10px 12px;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid rgba(255,200,100,0.35);
            background: rgba(255,255,255,0.07);
            color: #f0e0c0;
            font-size: 14px;
        }
        .input-group input:focus {
            outline: none;
            border-color: rgba(255,200,100,0.7);
        }
        button[type="submit"] {
            width: 100%;
            padding: 11px;
            margin-top: 6px;
            background: #8b2020;
            color: #f0e0c0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Noto Serif KR', serif;
            font-size: 14px;
            letter-spacing: 0.04em;
            transition: background 0.2s;
        }
        button[type="submit"]:hover { background: #a82828; }
        button[type="submit"]:disabled { background: #555; cursor: default; }
        #message {
            margin-top: 14px;
            font-size: 13px;
            min-height: 18px;
            font-family: 'Noto Serif KR', serif;
        }
        .back-link {
            display: block;
            margin-top: 18px;
            font-size: 12px;
            color: rgba(255,200,100,0.6);
            text-decoration: none;
            font-family: 'Noto Serif KR', serif;
        }
        .back-link:hover { color: #e8c97a; }
        #successBox {
            display: none;
            padding: 18px;
            background: rgba(0,80,0,0.3);
            border: 1px solid rgba(100,200,100,0.3);
            border-radius: 8px;
            margin-top: 10px;
            font-family: 'Noto Serif KR', serif;
            font-size: 13px;
            color: #a0e0a0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>高麗萬里地圖</h1>
        <p class="subtitle">통행패(비밀번호) 재설정</p>

        <div id="formBox">
            <div class="input-group">
                <label for="newPassword">새 통행패 (비밀번호)</label>
                <input type="password" id="newPassword" placeholder="6자 이상 입력" autocomplete="new-password">
            </div>
            <div class="input-group">
                <label for="confirmPassword">새 통행패 확인</label>
                <input type="password" id="confirmPassword" placeholder="동일하게 다시 입력" autocomplete="new-password">
            </div>
            <button type="submit" id="submitBtn">비밀번호 재설정</button>
            <p id="message"></p>
        </div>

        <div id="successBox">
            ✅ 비밀번호가 성공적으로 변경되었습니다.<br>
            <a href="/login.html" style="color:#e8c97a;">로그인 페이지로 이동 →</a>
        </div>

        <a href="/login.html" class="back-link">← 로그인 페이지로 돌아가기</a>
    </div>

    <script>
        const API_BASE_URL = '/api';

        // URL에서 token 파라미터 추출
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        const msgEl = document.getElementById('message');
        const formBox = document.getElementById('formBox');
        const successBox = document.getElementById('successBox');

        if (!token) {
            msgEl.style.color = '#e08080';
            msgEl.textContent = '유효하지 않은 접근입니다. 비밀번호 찾기를 다시 요청해주세요.';
            document.getElementById('submitBtn').disabled = true;
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');

            msgEl.style.color = '#e08080';

            if (!newPassword || newPassword.length < 6) {
                msgEl.textContent = '비밀번호는 6자 이상이어야 합니다.';
                return;
            }
            if (newPassword !== confirmPassword) {
                msgEl.textContent = '비밀번호가 일치하지 않습니다.';
                return;
            }

            btn.disabled = true;
            btn.textContent = '처리 중...';
            msgEl.textContent = '';

            try {
                const res = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();

                if (!res.ok) {
                    msgEl.textContent = data.message || '오류가 발생했습니다.';
                    btn.disabled = false;
                    btn.textContent = '비밀번호 재설정';
                    return;
                }

                // 성공
                formBox.style.display = 'none';
                successBox.style.display = 'block';

                // 3초 후 로그인 페이지로 이동
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 3000);

            } catch (err) {
                msgEl.textContent = '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
                btn.disabled = false;
                btn.textContent = '비밀번호 재설정';
            }
        });

        // Enter 키 지원
        ['newPassword', 'confirmPassword'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('submitBtn').click();
            });
        });
    </script>
</body>
</html>
